# organ_intent_map.yaml — Canonical routing map for arifOS kernel
# arif_route(intent=) → routes to the correct organ
# Respects RULE 14 MODE-FIRST NAMING
#
# Usage in arif_route:
#   intent: "seismic interpretation" → GEOX
#   intent: "well log analysis"     → GEOX
#   intent: "portfolio risk"        → WEALTH
#   intent: "biometric assessment"   → WELL
#
# Format: intent_keyword → organ_id
# Match priority: longest keyword wins (substring match)
#
# Ratified: 2026-06-20
# Updated: 2026-06-30 — G13 fix: machine-domain routing added (was misrouting to WELL)
---
organ_routes:
  # ── arifOS Kernel: machine / governance / constitutional domain ──────────
  # G13 FIX (2026-06-30): Previously arifos had NO keywords — it was only the
  # default fallback. Machine-domain queries containing "health", "readiness",
  # etc. would match WELL keywords. Now arifos has explicit machine keywords
  # (longer than WELL's generic ones) so machine queries route correctly.
  arifos:
    intent_keywords:
      # Machine / MCP surface
      - MCP
      - MCP server
      - MCP tool
      - MCP endpoint
      - MCP connector
      - tool registry
      - tool schema
      - tool conformance
      - tool surface
      - tool manifest
      - tools/list
      - tools/call
      - capability surface
      - capability lease
      # Governance / constitutional
      - kernel health
      - kernel status
      - kernel route
      - kernel attest
      - arifos kernel
      - arifos health
      - arifos status
      - constitutional floor
      - constitutional check
      - governance check
      - governance status
      - seal boundary
      - seal verdict
      - authority envelope
      - epistemic tag
      - cognitive axis
      # Session / memory / vault
      - initialize session
      - session init
      - session anchor
      - memory recall
      - memory search
      - vault seal
      - vault ledger
      - lease request
      - belief state
      - runtime schema
      # Canonical tool names (explicit arif_* queries)
      - arif init
      - arif route
      - arif triage
      - arif judge
      - arif seal
      - arif measure
      - arif observe
      - arif think
      - arif critique
      - arif bridge
      - arif gateway
      - arif forge
      - arif_forge
      - arif memory
      - arif_memory
      - arif session
      - arif vault
      # Federation
      - federation contract
      - federation manifest
      - organ attestation
      - organ health
      - agentic search
      - agent registry
      # Sovereign / personal decisions (original arifos domain)
      - life roadmap
      - career decision
      - personal decision
      - what should i do
      - life direction
      - should i leave
      - should i stay
      - human sovereign
      - sovereign decision
      - life choice
      - exit strategy
      - what do i want
      - my future
    organ: arifOS
    port: 8088
    tool_prefix: arifos_

  aaa:
    intent_keywords:
      - cockpit
      - dashboard
      - control plane
      - AAA cockpit
      - AAA dashboard
      - agent identity
      - agent registry cockpit
      - permission list
      - access control
      - audit log
      - federation health
      - approval queue
      - A2A gateway
      - identity anchor
      - throttle
