  well:
    intent_keywords:
      # G13 FIX: "health" removed from WELL — it was too broad and captured
      # machine/federation/kernel health queries. Now only human/vitality
      # health keywords route to WELL. "health" alone defaults to arifOS.
      # Specific human-health phrases (longer match) still route here:
      - human health
      - personal health
      - wellness
      - vitality
      - biometric
      - sleep
      - heart rate
      - hrv
      - resting heart
