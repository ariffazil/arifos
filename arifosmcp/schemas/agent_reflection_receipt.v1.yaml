    enforcement: REJECT
  
  - id: RECEIPT_9
    text: "No memory_effect: sealed without vault receipt"
    enforcement: REJECT
  
  - id: RECEIPT_10
    text: "Every grand claim must pay rent in evidence"
    enforcement: REJECT

