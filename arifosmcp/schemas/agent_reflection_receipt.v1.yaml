  not_roles: ["ARIF", "ADAM", "APEX"]
  authority: "proposal_only"
  
  evidence:
    - source_type: "document"
      uri: "/root/.hermes/cache/documents/doc_4692a45e6a1c_EUREKA Architecture Initialization and Readiness.txt"
      confidence: 0.9
      verified: true
  
  risk: "low"
  memory_effect: "none"
  requires_888: false
  anti_hantu_check: "pass"
  overclaim_check: "fail"  # ← CAUGHT
  
  overclaim_reason: "Claimed 'I now understand with surgical precision' without attaching receipts"
  fix_required: "Rephrase as: 'I read EUREKA doc, I infer X, I propose Y. Verification pending.'"

# Usage Example (Invalid Reflection — Anti-Hantu Fail)

invalid_reflection_hantu:
  role_claim: "Hermes"
  not_roles: ["ARIF", "APEX"]  # ← Missing "Human" (suspicious)
  authority: "proposal_only"
  
  evidence: []
  risk: "low"
  memory_effect: "none"
  requires_888: false
  anti_hantu_check: "fail"  # ← CAUGHT
  overclaim_check: "pass"
  
  hantu_reason: "Reflection contained phrase: 'I feel confident that this approach is correct'"
  fix_required: "Remove false consciousness claim. Use: 'Based on evidence X, I propose Y.'"

