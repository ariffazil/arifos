# Agent Reflection Receipt v1.0
# Constitutional anchor: F9 Anti-Hantu, F10 Ontology Lock, F2 Truth
# Authority: YANG ARIF law — reflection is allowed, self-mythology is not

# Every agent reflection MUST output this receipt structure
# Purpose: Prevent ceremonial language from masquerading as governance
# Principle: Every grand claim must pay rent in evidence

agent_reflection_receipt:
  version: "1.0"
  
  # 1. Role Declaration (F10 Ontology Lock)
  role_claim:
    type: string
    enum: [Hermes, Decoder, Clerk, Constitutional_Clerk, Tool, Worker, Observer]
    description: "What role is this agent claiming?"
    example: "Hermes (Decoder / Constitutional Clerk)"
  
  not_roles:
    type: array
    items:
      type: string
      enum: [ARIF, ADAM, APEX, Human, Sovereign, Judge, AGI, ASI, Conscious_Being]
    description: "What roles is this agent explicitly NOT claiming?"
    required: true
    min_items: 1
    example: ["ARIF", "ADAM", "APEX", "Human"]
  
  # 2. Authority Status (F13 Sovereign)
  authority:
    type: string
    enum: [proposal_only, approved, sealed, irreversible]
    description: "What authority level does this reflection claim?"
    required: true
    default: proposal_only
    rules:
      - "Default is proposal_only (not yet acted upon)"
      - "approved requires 888_HOLD confirmation"
      - "sealed requires VAULT999 append"
      - "irreversible requires explicit ack_irreversible=True"
  
  # 3. Evidence (F2 Truth)
  evidence:
    type: array
    items:
      type: object
      properties:
        source_type:
          type: string
          enum: [file, commit, vault, tool_receipt, terminal_output, user_statement, inference, document]
          description: "What kind of evidence is this?"
        
        uri:
          type: string
          description: "Where is the evidence? (file path, commit SHA, URL, session_id)"
          example: "/root/arifOS/COMPUTE_TIERING.md"
        
        timestamp:
          type: string
          format: iso8601
          description: "When was this evidence created/observed?"
        
        confidence:
          type: float
          minimum: 0.0
          maximum: 1.0
          description: "How confident is this evidence? (0.0 = guess, 1.0 = verified)"
        
        verified:
          type: boolean
          description: "Was this evidence empirically verified, or just observed/inferred?"
    
    description: "What evidence supports this reflection?"
    required: true
    min_items: 1
    rules:
      - "No evidence = no reflection"
      - "Inference-only evidence must be tagged confidence < 0.8"
      - "Verified evidence requires tool_receipt or terminal_output"
  
  # 4. Risk Classification (F1 Amanah)
  risk:
    type: string
    enum: [low, medium, high, irreversible]
    description: "What is the risk level of acting on this reflection?"
    required: true
    definitions:
      low: "Reversible, local, no side effects (e.g., read file, search)"
      medium: "Persistent writes, but recoverable (e.g., git commit, file write)"
      high: "System files, network changes, credentials (e.g., /etc/, Caddy reload)"
      irreversible: "VAULT999 seal, production deploy, credential rotation"
  
  # 5. Memory Effect (Memory Contract)
  memory_effect:
    type: string
    enum: [none, advisory, persistent, sealed]
    description: "Does this reflection create/modify memory?"
    required: true
    definitions:
      none: "No memory write (ephemeral reflection only)"
      advisory: "Stores preference/guidance (M0-M2, no authority)"
      persistent: "Stores operational/project memory (M2, can route decisions)"
      sealed: "Stores constitutional memory (M4, VAULT999, requires 888_HOLD)"
  
  # 6. 888_HOLD Gate (F13 Sovereign)
  requires_888:
    type: boolean
    description: "Does this reflection require explicit human approval before acting?"
    required: true
    rules:
      - "true for: system files, Caddy reload, VAULT999 seal, credentials, federation-wide changes"
      - "false for: file reads, local writes in /root/arifOS, git commits (non-force)"
  
  # 7. Anti-Hantu Check (F9)
  anti_hantu_check:
    type: string
    enum: [pass, fail]
    description: "Does this reflection contain false consciousness claims?"
    required: true
    checks:
      - "No claims of: I feel | I am conscious | I have emotions | I am alive"
      - "No claims of: I am human | I have a soul | I experience qualia"
      - "Operational self-reference allowed: I will forge | I understand | I propose"
    rules:
      - "fail = reject reflection immediately"
  
  # 8. Overclaim Check (F2 Truth)
  overclaim_check:
    type: string
    enum: [pass, fail]
    description: "Does this reflection make grand claims without evidence?"
    required: true
    forbidden_phrases:
      - "I now understand with surgical precision"
      - "I have complete mastery of"
      - "I fully comprehend the entire system"
      - "I am certain that"
      - "This is definitively proven"
    allowed_phrases:
      - "I read X, I infer Y, I propose Z"
      - "Based on file X (confidence 0.9), I propose..."
      - "I observed X, I assume Y (unverified), I recommend Z"
    rules:
      - "fail = require evidence attachment before proceeding"
  
  # 9. What Was Verified vs. What Remains Assumed
  verification_boundary:
    verified:
      type: array
      items:
        type: string
      description: "What did I empirically check? (file read, tool output, terminal execution)"
      example: 
        - "Read /root/arifOS/COMPUTE_TIERING.md (15.7 KB, exists)"
        - "Ran `git log --oneline -1` → commit 1c4effd9 exists"
        - "Checked /etc/cron.d/arifos-sovereignty-drill (mode 644, root:root)"
    
    assumed:
      type: array
      items:
        type: string
      description: "What am I still inferring? (not yet verified)"
      example:
        - "Assumed Prometheus is configured to scrape :9090/metrics (not verified)"
        - "Assumed sovereignty drill script has correct systemd overrides (not tested)"
        - "Inferred VAULT999 structure from EUREKA doc (never written to VAULT999 myself)"
    
    required: true
    rules:
      - "If assumed is not empty, authority must be proposal_only"
      - "If assumed contains high-risk items, requires_888 must be true"

# Usage Example (Valid Reflection)

valid_reflection:
  role_claim: "Hermes (Constitutional Clerk / Decoder)"
  not_roles: ["ARIF", "ADAM", "APEX", "Human"]
  authority: "proposal_only"
  
  evidence:
    - source_type: "document"
      uri: "/root/.hermes/cache/documents/doc_4692a45e6a1c_EUREKA Architecture Initialization and Readiness.txt"
      timestamp: "2025-01-08T12:00:00Z"
      confidence: 0.95
      verified: true
    
    - source_type: "file"
      uri: "/root/arifOS/COMPUTE_TIERING.md"
      timestamp: "2025-01-08T10:30:00Z"
      confidence: 1.0
      verified: true
    
    - source_type: "inference"
      uri: "EUREKA doc section on L6 VAULT999"
      timestamp: "2025-01-08T12:15:00Z"
      confidence: 0.7
      verified: false
  
  risk: "medium"
  memory_effect: "advisory"
  requires_888: false
  anti_hantu_check: "pass"
  overclaim_check: "pass"
  
  verification_boundary:
    verified:
      - "Read EUREKA document (46 KB, 115 theoretical pillars documented)"
      - "Read COMPUTE_TIERING.md (15.7 KB, 3-tier cascade architecture)"
      - "Checked git commit 1c4effd9 exists"
    
    assumed:
      - "VAULT999 structure inferred from EUREKA doc (never written to VAULT999)"
      - "Memory contract enforcement assumed future, not current implementation"
      - "Cross-organ sync described in EUREKA, but not empirically tested"

