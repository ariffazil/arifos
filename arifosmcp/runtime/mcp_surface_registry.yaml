# MCP Surface Registry — arifOS Federation
# ════════════════════════════════════════════════════════════════════════════
# Doctrine (per amendment_001.md, 2026-06-12):
#   "Use MCP for exposure. Use arifOS for authority."
#   "Does it need model-mediated invocation? If yes, MCP-shaped. If no, don't."
#
# This registry defines the 4-tier visibility governance for the entire
# arifOS federation. It is the SINGLE SOURCE OF TRUTH for what the model
# is allowed to see. Constitutional surface (the 13 canonical arif_*
# tools + 13 floors) is NEVER mutated by this file.
#
# Author: @integrator (session 2026-06-12-mcp-governor-and-minimax-forge)
# Forged: 2026-06-12
# Reversibility: full (yaml + git revert)
# ════════════════════════════════════════════════════════════════════════════

version: 1
forge_session: "2026-06-12-mcp-governor-and-minimax-forge"
actor_id: "mcp-governor-forge"
session_id: "2026-06-12-mcp-governor-and-minimax-forge"

tiers:
  core:
    description: >
      Constitutional kernel tools. Always exposed when organ_health=healthy.
      These are the SAFE surface the model is allowed to see by default.
    expose_by_default: true
    max_tools: 12
    requires:
      constitution_hash: true
      health: "healthy"
      schema_hash: true
      version: true
    examples:
      - "arifOS 13 canonical arif_* tools (when arifOS=healthy)"
      - "WEALTH public surface when WEALTH=healthy"
      - "GEOX canonical when GEOX=healthy"

  organ:
    description: >
      Domain organ tools. Exposed only after explicit intent match.
      Each organ contributes up to 8 tools in the visible set.
    expose_by_default: false
    expose_only_after_intent_match: true
    max_tools_per_organ: 8
    requires:
      constitution_hash: true
      health: "healthy"
      schema_hash: true
      version: true
    examples:
      - "minimax-media: 9 media tools when intent=media"
      - "minimax-code: web_search+understand_image when intent=search"
      - "minimax_search: search+browse when intent=search (F12-gated)"
      - "WELL somatic when intent=wellness"

  lab:
    description: >
      Experimental tools. Exposed only when explicitly routed by an
      Intent+Authority pair. Default TTL 30 days.
    expose_by_default: false
    requires_explicit_route: true
    ttl_days: 30
    examples:
      - "minimax_search until F12 hardening complete"
      - "Any new tool that has not yet cleared 7-day burn-in"

  deprecated:
    description: >
      Tools that exist but are no longer callable. Removed from MCP
      surface but kept in registry for audit trail.
    expose_by_default: false
    callable: false
    examples:
      - "minimax-mcp-code alias (replaced by minimax-code)"

entropy_budget:
  description: >
    Hard ceilings on the visible surface to prevent tool-vector crowding.
    Per amendment_001: "Fix the visibility layer. Keep the full federation.
    Show the model only the tools that are healthy, authorized, and relevant."

  default_visible_tools_max: 15
  per_organ_visible_tools_max: 8
  degraded_organ_visible_tools_max: 3
  max_schema_tokens_per_tool: 700
  max_description_chars: 480
  duplicate_similarity_threshold: 0.82
  stale_tool_days: 45

  shortlist_targets:
    default_visible: "9-15"
    task_routed: "3-7"
    emergency: "1-3"

authority:
  description: >
    Constitutional authority boundaries. Authority is SEPARATE from
    exposure: a tool may be visible (MCP) but not callable (arifOS lease).
  expose_decision: "MCP (this registry + visibility_policy.py)"
  call_decision: "arifOS (lease + judge verdict)"
  state_decision: "arifOS (KernelState)"
  sealing_decision: "arifOS (VAULT999)"

