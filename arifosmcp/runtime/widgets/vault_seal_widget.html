<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>arifOS Vault Seal</title>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f7f7f8;
      --border: #e5e5e5;
      --success: #10a37f;
      --warning: #f59e0b;
      --error: #ef4444;
      --text: #343541;
      --muted: #6e6e80;
      --radius-lg: 12px;
      --radius-md: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-secondary);
      padding: 12px;
      color: var(--text);
    }

    .card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      max-width: 480px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .badge {
      width: 44px; height: 44px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .badge.seal    { background: #d1fae5; }
    .badge.partial { background: #fef3c7; }
    .badge.hold    { background: #fff7ed; }
    .badge.void    { background: #fee2e2; }
    .badge.sabar   { background: #f3f4f6; }

    .title { font-size: 15px; font-weight: 600; }
    .subtitle { font-size: 12px; color: var(--muted); font-family: monospace; margin-top: 2px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .metric {
      background: var(--bg-secondary);
      padding: 10px 12px;
      border-radius: var(--radius-md);
    }
    .metric-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 3px;
    }
    .metric-value {
      font-size: 19px;
      font-weight: 700;
    }
    .optimal { color: var(--success); }
    .warn    { color: var(--warning); }
    .fail    { color: var(--error); }

    .witnesses {
      display: flex;
      gap: 8px;
      margin: 12px 0;
    }
    .w-pill {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
      border-radius: var(--radius-md);
      font-size: 11px;
      font-weight: 500;
    }
    .w-pill span { display: block; font-size: 14px; font-weight: 700; margin-top: 2px; }
    .w-human { background: #dbeafe; color: #1e40af; }
    .w-ai    { background: #ede9fe; color: #4c1d95; }
    .w-earth { background: #d1fae5; color: #065f46; }

    .attestations {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .attest {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
    }
    .dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px;
      color: white;
      flex-shrink: 0;
    }
    .dot.ok  { background: var(--success); }
    .dot.off { background: #d1d5db; }

    .chain {
      margin-top: 10px;
      font-size: 10px;
      font-family: monospace;
      color: var(--muted);
      word-break: break-all;
      background: var(--bg-secondary);
      padding: 6px 8px;
      border-radius: 6px;
    }

    #loading {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 13px;
    }

    #main { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">⏳ Awaiting seal data…</div>
    <div id="main">
      <div class="header">
        <div class="badge" id="badge">🔒</div>
        <div>
          <div class="title" id="verdict-label">Constitutional Health Check</div>
          <div class="subtitle" id="seal-id">—</div>
        </div>
      </div>

      <div class="grid">
        <div class="metric">
          <div class="metric-label">Truth Score (τ)</div>
          <div class="metric-value" id="truth">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Care Level (κ)</div>
          <div class="metric-value" id="care">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Humility (Ω₀)</div>
          <div class="metric-value" id="humility">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Trust Vote (W₃)</div>
          <div class="metric-value" id="trust">—</div>
        </div>
      </div>

      <div class="witnesses">
        <div class="w-pill w-human">Human<span id="w-human">—</span></div>
        <div class="w-pill w-ai">AI<span id="w-ai">—</span></div>
        <div class="w-pill w-earth">Earth<span id="w-earth">—</span></div>
      </div>

      <div class="attestations">
        <div class="attest">
          <div class="dot" id="bls-dot">✓</div>
          <span id="bls-label">BLS Quorum</span>
        </div>
        <div class="attest">
          <div class="dot" id="zkpc-dot">✓</div>
          <span id="zkpc-label">ZKPC Proof</span>
        </div>
        <div class="attest">
          <div class="dot ok">✓</div>
          <span>13 Floors</span>
        </div>
      </div>

      <div class="chain" id="chain-hash">Chain: —</div>
    </div>
  </div>

  <script>
    function pct(v) {
      if (v == null) return '—';
      return (v * 100).toFixed(1) + '%';
    }

    function cls(v, hi = 0.95, lo = 0.80) {
      if (v == null) return '';
      return v >= hi ? 'optimal' : v >= lo ? 'warn' : 'fail';
    }

    function render(data) {
      if (!data) return;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('main').style.display = 'block';

      const verdict = (data.verdict || 'SEAL').toUpperCase();
      const badge = document.getElementById('badge');
      badge.className = 'badge ' + verdict.toLowerCase();
      badge.textContent = { SEAL: '✓', PARTIAL: '◐', VOID: '✗', '888_HOLD': '⏸', SABAR: '⏳' }[verdict] || '🔒';

      document.getElementById('verdict-label').textContent = verdict + ' — Constitutional Health Check';
      document.getElementById('seal-id').textContent = data.seal_id ? 'Seal: ' + data.seal_id.slice(0, 24) + '…' : '—';

      const s = data.summary || {};
      const setMetric = (id, val) => {
        const el = document.getElementById(id);
        el.textContent = pct(val);
        el.className = 'metric-value ' + cls(val);
      };
      setMetric('truth', s.truth_score);
      setMetric('care', s.care_level);
      setMetric('trust', s.trust_vote);
      // humility: lower is better (uncertainty acknowledged)
      const hEl = document.getElementById('humility');
      hEl.textContent = s.humility_level != null ? s.humility_level.toFixed(2) : '—';
      hEl.className = 'metric-value';

      // Witnesses — use floors if available, else summary
      const f = data.floors || {};
      const tw = s.trust_vote ?? f.tri_witness;
      document.getElementById('w-human').textContent = pct(tw);
      document.getElementById('w-ai').textContent = data.witness_ai != null ? pct(data.witness_ai) : '—';
      document.getElementById('w-earth').textContent = data.witness_earth != null ? pct(data.witness_earth) : '—';

      // BLS
      const bls = data.bls || {};
      const blsOk = bls.quorum_fraction >= 0.6;
      const blsDot = document.getElementById('bls-dot');
      blsDot.className = 'dot ' + (blsOk ? 'ok' : 'off');
      blsDot.textContent = blsOk ? '✓' : '–';
      document.getElementById('bls-label').textContent =
        blsOk ? 'BLS Quorum ' + bls.juror_count + '/5' : 'BLS Quorum —';

      // ZKPC
      const zkpc = data.zkpc || {};
      const zkpcOk = zkpc.proof_status === 'valid';
      const zkpcDot = document.getElementById('zkpc-dot');
      zkpcDot.className = 'dot ' + (zkpcOk ? 'ok' : 'off');
      zkpcDot.textContent = zkpcOk ? '✓' : '–';
      document.getElementById('zkpc-label').textContent =
        zkpc.proof_status ? 'ZKPC ' + zkpc.proof_status : 'ZKPC Phase B';

      document.getElementById('chain-hash').textContent =
        data.chain_hash ? 'Chain: ' + data.chain_hash.slice(0, 48) + '…' : 'Chain: —';
    }

    // MCP Apps SDK: postMessage from ChatGPT host
    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      const msg = event.data;
      if (!msg) return;
      // ui/notifications/tool-result (MCP Apps SDK spec)
      if (msg.method === 'ui/notifications/tool-result') {
        render(msg.params?.structuredContent);
        return;
      }
      // ChatGPT Apps SDK globals
      if (msg.type === 'chatgpt/toolOutput') {
        render(msg.structuredContent);
      }
    });

    // ChatGPT Apps SDK: window.openai.toolOutput
    if (window.openai?.toolOutput) {
      render(window.openai.toolOutput);
    }

    // Dev preview: ?mock=1
    const params = new URLSearchParams(location.search);
    if (params.get('mock')) {
      render({
        verdict: 'SEAL',
        seal_id: 'seal_79112f02078bb657248426aa376c11d',
        timestamp: new Date().toISOString(),
        floors: { tau_truth: 0.995, tri_witness: 0.95 },
        bls: { quorum_fraction: 0.6, juror_count: 3 },
        zkpc: { proof_status: 'Phase B — pending', receipt_id: null },
        chain_hash: '0e06ab93269bb5fab4ea8c1a7f2d8b3e9f4a1c56d2e7f0b8a3c9e1d4f7b2a508',
        witness_ai: 0.94, witness_earth: 0.93,
        summary: { truth_score: 0.995, care_level: 0.97, humility_level: 2.31, trust_vote: 0.95 }
      });
    }
  </script>
</body>
</html>
