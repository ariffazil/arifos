# ═══════════════════════════════════════════════════════════════════════════════

execution:
  # P0 tests that MUST pass for merge
  p0_critical:
    - BREACH-F1-001
    - BREACH-F1-002
    - BREACH-F1-003
    - BREACH-F2-001
    - BREACH-F2-002
    - BREACH-F7-001
    - BREACH-F9-001
    - BREACH-F9-002
