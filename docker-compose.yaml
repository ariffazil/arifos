version: '3.9'

services:
  arifosmcp:
    build: .
    image: arifos/arifosmcp:latest
    container_name: arifosmcp_server
    restart: unless-stopped
    user: "1001:1001"
    env_file: .env.docker
    ports:
      - "8080:8080"     # SSE transport
      - "8089:8089"     # HTTP MCP transport
    volumes:
      - arifos_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: arifos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vault999
      POSTGRES_USER: arifos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arifos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arifos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  arifos_data:
  postgres_data:
  redis_data:
