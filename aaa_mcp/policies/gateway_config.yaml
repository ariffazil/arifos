# arifOS MCP Gateway — Constitutional Policy Configuration
# 
# This file defines thresholds and rules for the 13-floor enforcement
# in the MCP Gateway. Edit this to tune governance without touching code.
#
# DITEMPA BUKAN DIBERI — Forged, Not Given

version: "60.1.0"

# =============================================================================
# IDENTITY MODEL (F11 Authority)
# =============================================================================

identity:
  # Identity sources (in order of preference)
  sources:
    - idp_oidc          # OpenID Connect (Keycloak, Auth0, etc.)
    - k8s_service_account  # Kubernetes SA token
    - mcp_auth_token    # Legacy MCP auth
  
  # Required claims for different operation classes
  required_claims:
    read_only:
      - sub             # Subject identifier
    infra_write:
      - sub
      - groups          # Team/organization membership
    destructive:
      - sub
      - groups
      - approval_ticket # Pre-approved change ticket
    prod_write:
      - sub
      - groups
      - approval_ticket
      - human_attestation  # Signed attestation from human
  
  # Group-to-permission mapping
  rbac:
    groups:
      platform-engineers:
        - read_only
        - infra_write
      sre-oncall:
        - read_only
        - infra_write
        - destructive
      platform-leads:
        - read_only
        - infra_write
        - destructive
        - prod_write

# =============================================================================
# FLOOR THRESHOLDS (Tunable per environment)
# =============================================================================

thresholds:
  # F2 Truth: Image provenance score (0.0-1.0)
  f2_truth:
    default: 0.90
    staging: 0.70      # More lenient in staging
    production: 0.95   # Strict in production
  
  # F6 Empathy: Stakeholder care coefficient κᵣ (0.0-1.0)
  f6_empathy:
    default: 0.70
    critical: 0.95     # For high-blast-radius ops
  
  # F5 Peace²: Stability index (0.0-1.0)
  f5_peace:
    default: 0.70
    production: 0.85
  
  # F8 Genius: Resource efficiency (0.0-1.0)
  f8_genius:
    default: 0.80
  
  # F10 Ontology: Axiom match score (0.0-1.0)
  f10_ontology:
    default: 0.80
    production: 0.90

# =============================================================================
# BLAST RADIUS CALCULATION (F6 Empathy)
# =============================================================================

blast_radius:
  # Critical namespaces (higher blast radius)
  critical_namespaces:
    - prod
    - production
    - kube-system
    - monitoring
    - vault
  
  # Resource weights for blast radius calculation
  resource_weights:
    Deployment: 1.0
    StatefulSet: 1.5    # Higher impact (persistent data)
    DaemonSet: 2.0      # Runs on all nodes
    Service: 0.5
    ConfigMap: 0.3
    Secret: 0.8         # Sensitive
    PersistentVolumeClaim: 1.2
  
  # Pod count multipliers
  pod_multipliers:
    "< 3": 0.5
    "3-10": 1.0
    "10-50": 1.5
    "> 50": 2.0
  
  # Score thresholds
  score_thresholds:
    low: 0.3            # Acceptable
    medium: 0.5         # Warning
    high: 0.7           # Requires extra review
    critical: 0.9       # Mandatory 888_HOLD

# =============================================================================
# 888_HOLD TRIGGERS (F13 Sovereign)
# =============================================================================

hold_triggers:
  # Always require human approval for:
  always_require_override:
    - namespace: prod
      operation: delete
    - namespace: production
      operation: delete
    - namespace: kube-system
      operation: any
    - blast_radius_score: "> 0.7"
  
  # Cooling-off periods (Phoenix-72 schedule)
  cooling_periods:
    destructive_in_prod: "72h"
    infra_write_in_prod: "24h"
    schema_changes: "168h"  # 1 week for DB schema
  
  # Auto-approval conditions (bypass 888_HOLD)
  auto_approval:
    - condition: "blast_radius_score < 0.3"
      namespace: "staging"
      operation: "apply"
    - condition: "dry_run == true"
      # Dry runs never need approval

# =============================================================================
# TOOL CLASSIFICATION
# =============================================================================

tool_classification:
  # K8s tools
  k8s_get: read_only
  k8s_describe: read_only
  k8s_logs: read_only
  k8s_apply: infra_write
  k8s_scale: infra_write
  k8s_rollout: infra_write
  k8s_rollback: infra_write
  k8s_delete: destructive
  
  # Docker tools
  docker_scan: read_only
  docker_build: infra_write
  docker_run: infra_write
  docker_push: infra_write
  docker_stop: infra_write
  docker_rm: destructive
  
  # Policy tools
  validate_manifest: read_only
  validate_image: read_only
  check_compliance: read_only

# =============================================================================
# POST-DEPLOY OBSERVABILITY (F4 Clarity)
# =============================================================================

observability:
  # Health check configuration
  health_checks:
    enabled: true
    timeout: "5m"
    interval: "10s"
  
  # Metrics to verify after deployment
  success_criteria:
    error_rate:
      threshold: "< 1%"
      window: "5m"
    latency_p99:
      threshold: "< 500ms"
      window: "5m"
    pod_ready:
      threshold: "100%"
      timeout: "2m"
  
  # Auto-rollback triggers
  auto_rollback:
    enabled: true
    on_health_check_failure: true
    on_error_rate_spike: true

# =============================================================================
# AUDIT & COMPLIANCE
# =============================================================================

audit:
  # What to log to VAULT999
  log_to_vault:
    - all_gateway_decisions
    - all_888_holds
    - all_void_verdicts
    - production_operations
  
  # Retention (days)
  retention_days: 2555  # 7 years
  
  # Compliance frameworks
  frameworks:
    - soc2
    - iso27001
    - nist_ai_rmf
