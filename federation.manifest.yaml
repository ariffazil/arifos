routing_topology:
  primary_judgment: arifos
  geox:          arifos
  wealth:        arifos
  well:          arifos
  a_forge:       arifos
  aaa_a2a:       arifos

  a2a_mesh:
    aaa_a2a:
      - a_forge      # approval routing
      - arifos       # verdict request
    a_forge:
      - arifos       # judgment request
      - geox         # evidence request
    geox:
      - wealth       # economic evidence
      - well         # human readiness

  execution_chain:
    - arif_judge_deliberate  # 888 returns SEAL
    - arif_forge_execute     # 010 executes after SEAL

# ─── FINAL VERDICT AUTHORITY ────────────────────────────────────────────────────

final_verdict_authority:
  only: arifos.888_JUDGE
  human_final_judge: Arif
  human_veto_absolute: true
  hold_conditions:
    - secret_rotation
    - public_deploy_without_build_test_health
    - cross_repo_architecture_change
    - destructive_or_irreversible_action

# ─── A2A HANDSHAKE CONTRACT ──────────────────────────────────────────────────

a2a_handshake:
  required_fields:
    - organ_id
    - schema_version
    - contract_hash
    - tool_registry_hash
    - authority_exclusions
    - last_verified
    - callable_surface_count
  reject_if:
    phantom_tools: true
    contract_hash_missing: true
    authority_overlap: true
    last_verified_stale: true  # > 30 days
    advertised_not_callable: true

# ─── DEGRADATION STATES ──────────────────────────────────────────────────────

degradation_states:
  SELAMAT:
    description: Healthy — all organs reachable, all tools callable
    action: normal_operation
  AMANAH:
    description: Usable with warning — minor degradation, no sovereign impact
    action: proceed_with_monitoring
  SABAR:
    description: Degraded — reduced functionality, awaiting recovery
    action: await_conditions_normalize
  HOLD:
    description: Cannot proceed safely — requires human judgment
    action: escalate_to_Arif
  VOID:
    description: Invalid or unsafe — do not proceed
    action: block_and_alert

