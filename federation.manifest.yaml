    meaning: Control plane routing
  arifos_*:
    owner: arifOS
    meaning: Federation/kernel meta-diagnostics

# ─── PROMPT BOUNDARIES ────────────────────────────────────────────────────────

prompt_contracts:
  arifos:
    must_do: [verify_evidence, check_floors, declare_uncertainty, cite_source]
    must_not_do: [final_geological_claim, capital_allocation, execute_without_seal]

  geox:
    must_do: [preserve_uncertainty, cite_evidence, distinguish_observed_from_interpreted]
    must_not_do: [allocate_capital, approve_drilling, issue_final_seal]

  wealth:
    must_do: [compute_consequence, expose_assumptions, declare_model_uncertainty]
    must_not_do: [declare_geological_truth, execute_transaction, override_judgment]

  well:
    must_do: [reflect_human_condition, preserve_dignity, assess_readiness]
    must_not_do: [diagnose_without_consent, claim_causation, override_sovereign]

  a_forge:
    must_do: [require_seal_before_execute, prepare_rollback, measure_ops_cost]
    must_not_do: [self_authorize, skip_judgment_gate, execute_phantom_tool]

  aaa_a2a:
    must_do: [route_transparently, expose_queue_state, maintain_audit_trail]
    must_not_do: [adjudicate, execute_domain_logic, claim_final_authority]

# ─── SOURCE-OF-TRUTH HIERARCHY ────────────────────────────────────────────────

source_of_truth:
  tier_1:
    name: live_callable_surface
    description: "curl /tools on each port — the actual runtime surface"
    priority: 1
  tier_2:
    name: canonical_tool_registry
    description: "arifosmcp/tool_registry.json for arifOS 13 tools"
    priority: 2
  tier_3:
    name: federation_manifest
    description: "THIS FILE — unified federation manifest"
    priority: 3
  tier_4:
    name: smithery_yaml
    description: "Public marketplace manifests (arifOS, GEOX, A-FORGE)"
    priority: 4
  tier_5:
    name: agents_md_readme
    description: "AGENTS.md and README documentation"
    priority: 5
  tier_6:
    name: agent_memory
    description: "Workspace memory files"
    priority: 6

# ─── VALIDATION RULES ─────────────────────────────────────────────────────────

validation:
  ci_tests:
    - name: advertised_callable_match
      description: Every tool in smithery.yaml must be in live callable surface
      severity: F2_VIOLATION
    - name: organ_name_matches_repo
      description: Every organ's manifest name must match its repo identity
      severity: F2_VIOLATION
    - name: authority_exclusions_valid
      description: No organ may claim authority it does not own
      severity: F13_VIOLATION
    - name: no_phantom_tools
      description: No tool may be callable that is not documented
      severity: F2_VIOLATION
    - name: contract_hash_current
      description: Every organ must expose a current contract hash
      severity: F2_WARNING
    - name: state_freshness
      description: WELL truth_status must be refreshed within 7 days
      severity: F4_WARNING
    - name: irreversible_has_rollback
      description: Every deploy tool must have a rollback path documented
      severity: F1_CRITICAL
