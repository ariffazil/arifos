  arif_*:
    owner: arifOS
    meaning: Constitutional kernel tools
  geox_*:
    owner: GEOX
    meaning: Earth evidence tools
  wealth_*:
    owner: WEALTH
    meaning: Capital computation tools
  well_*:
    owner: WELL
    meaning: Biological readiness tools
  forge_*:
    owner: A-FORGE
    meaning: Execution substrate tools
  a2a_*:
