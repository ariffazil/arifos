# Docker Compose Production Overrides
# Timestamp: 2026-03-14T06:14:00+00:00
# This file extends docker-compose.yml for production

version: "3.8"

volumes:
  arifosmcp_logs:
    driver: local
  arifosmcp_backups:
    driver: local

services:
  arifosmcp:
    volumes:
      - /var/log/arifosmcp:/var/log/arifosmcp:rw
      - /srv/arifosmcp/backups:/backups:rw
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        labels: "arifosmcp,production"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
