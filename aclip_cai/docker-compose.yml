services:
  aclip-cai:
    build:
      context: ..
      dockerfile: aclip_cai/Dockerfile
    ports:
      - "8889:8889"
    environment:
      - PYTHONUNBUFFERED=1
      - ARIFOS_ENV=production
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8889/health"]
      interval: 30s
      timeout: 10s
      retries: 3
