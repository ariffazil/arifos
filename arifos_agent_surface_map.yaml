arifos_agent_surface_map:
  mcp_tools:
    - arifos_init
    - arifos_observe
    - arifos_think
    - arifos_route
    - arifos_judge
    - arifos_act
    - arifos_seal
  mcp_resources:
    - arifos://doctrine/floors
    - arifos://registry/organs
    - arifos://state/latest
    - arifos://receipts/latest
    - arifos://mcp/surface-map
