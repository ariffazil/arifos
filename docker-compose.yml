# ── arifOS AI-First Unified Trinity Stack ──────────────────────────
# HARDENED LEAN PRODUCTION CONFIGURATION
# Version: 2026.04.06-LEAN-KERNEL
# ─────────────────────────────────────────────────────────────────

services:
  traefik:
    image: traefik:v3.6.9
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=arifbfazil@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/arifos/traefik/acme.json:/letsencrypt/acme.json
      - arifosmcp_secrets:/secrets:ro
    networks:
      - arifos_core_network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    init: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arifos_vault}
      POSTGRES_USER: ${POSTGRES_USER:-arifos_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/arifos/data/postgres:/var/lib/postgresql/data
    networks:
      - arifos_core_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arifos_admin} -d ${POSTGRES_DB:-arifos_vault}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    init: true
    command: redis-server --save 60 1 --loglevel warning --maxmemory 96mb --maxmemory-policy allkeys-lru
    volumes:
      - /opt/arifos/data/redis:/data
    networks:
      - arifos_core_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    init: true
    environment:
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=WARN
    volumes:
      - /opt/arifos/data/qdrant:/qdrant/storage
    networks:
      arifos_core_network:
        aliases:
          - qdrant_memory       # backward compat alias for older configs/scripts
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  arifos_landings:
    image: nginx:alpine
    container_name: arifos_landings
    volumes:
      - /opt/arifos/sites/arif-fazil.com/arif:/usr/share/nginx/html/arif:ro
      - /opt/arifos/sites/arif-fazil.com/arifos:/usr/share/nginx/html/arifos:ro
      - /opt/arifos/sites/arif-fazil.com/aaa:/usr/share/nginx/html/aaa:ro
      - /opt/arifos/sites/arif-fazil.com/forge:/usr/share/nginx/html/forge:ro
      - /opt/arifos/sites/arif-fazil.com/waw:/usr/share/nginx/html/waw:ro
      - /opt/arifos/sites/arif-fazil.com/apex:/usr/share/nginx/html/apex:ro
      - /opt/arifos/sites/arif-fazil.com/geox:/usr/share/nginx/html/geox:ro
      - /opt/arifos/sites/arif-fazil.com/wiki:/usr/share/nginx/html/wiki:ro
      - /opt/arifos/sites/arif-fazil.com/arifosmcp:/usr/share/nginx/html/arifosmcp:ro
      - /root/arifOS/infrastructure/nginx/arifos_landings.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - arifos_core_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.arif-landing.rule=Host(`arif-fazil.com`) || Host(`www.arif-fazil.com`)"
      - "traefik.http.routers.arifos-landing.rule=Host(`arifos.arif-fazil.com`)"
      - "traefik.http.routers.aaa-landing.rule=Host(`aaa.arif-fazil.com`)"
      - "traefik.http.routers.forge-landing.rule=Host(`forge.arif-fazil.com`)"
      - "traefik.http.routers.waw-landing.rule=Host(`waw.arif-fazil.com`)"
      - "traefik.http.routers.apex-landing.rule=Host(`apex.arif-fazil.com`)"
      - "traefik.http.routers.wiki-landing.rule=Host(`wiki.arif-fazil.com`)"
      - "traefik.http.routers.arif-landing.entrypoints=websecure"
      - "traefik.http.routers.arif-landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.arifos-landing.entrypoints=websecure"
      - "traefik.http.routers.arifos-landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.aaa-landing.entrypoints=websecure"
      - "traefik.http.routers.aaa-landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.forge-landing.entrypoints=websecure"
      - "traefik.http.routers.forge-landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.apex-landing.entrypoints=websecure"
      - "traefik.http.routers.apex-landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.waw-landing.entrypoints=websecure"
      - "traefik.http.routers.waw-landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.wiki-landing.entrypoints=websecure"
      - "traefik.http.routers.wiki-landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.arifosmcp-landing.rule=Host(`arifosmcp.arif-fazil.com`)"
      - "traefik.http.routers.arifosmcp-landing.entrypoints=websecure"
      - "traefik.http.routers.arifosmcp-landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.geox-landing.rule=Host(`geox.arif-fazil.com`)"
      - "traefik.http.routers.geox-landing.entrypoints=websecure"
      - "traefik.http.routers.geox-landing.tls.certresolver=letsencrypt"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    init: true
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_models:/root/.ollama
    networks:
      arifos_core_network:
        aliases:
          - ollama_engine       # backward compat alias for older configs/scripts
    restart: unless-stopped

  openclaw:
    image: arifos/arifos:unified
    container_name: openclaw
    init: true
    user: root
    env_file:
      - path: .env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://ollama:11434
      - BROWSERLESS_URL=http://headless_browser:3000
    volumes:
      - /opt/arifos/data/openclaw:/root/.openclaw
      - /root/arifOS/skills/vps-monitor:/app/extensions/vps-monitor
      - /root/arifOS:/mnt/arifos:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - arifos_core_network
    ports:
      - "127.0.0.1:18790:18789"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw.rule=Host(`claw.arifosmcp.arif-fazil.com`)"
      - "traefik.http.routers.openclaw.entrypoints=websecure"
      - "traefik.http.routers.openclaw.tls.certresolver=letsencrypt"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"
    restart: unless-stopped

  arifosmcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: arifos/arifosmcp:latest
    container_name: arifosmcp
    init: true
    working_dir: /usr/src/project
    command: ["python", "server.py"]
    env_file:
      - path: .env
    environment:
      - PYTHONPATH=/usr/src/project
      - VPS_MODE=1
      - ARIFOS_DEPLOYMENT=vps
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=arifos_memory
      - EMBEDDING_MODEL=bge-m3
      - EMBEDDING_DIMENSION=1024
      - LANCEDB_PATH=/usr/src/project/arifosmcp/data/vector_cache.lance
    volumes:
      - /root/arifOS:/usr/src/project:rw
      - /opt/arifos/data/core:/usr/src/project/arifosmcp/data:rw
      - arifosmcp_telemetry:/usr/src/project/arifosmcp/telemetry:rw
      - arifosmcp_vault:/usr/src/project/arifosmcp/VAULT999:rw
      - arifosmcp_secrets:/secrets:ro
    networks:
      - arifos_core_network
    ports:
      - "8080:8080"
      - "8089:8089"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://localhost:8080/health | grep -q 'healthy' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    # Traefik route disabled - served via arifos_landings nginx proxy
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 65535
        hard: 65535

  webhook:
    image: almir/webhook:latest
    container_name: arifos_webhook
    init: true
    command: ["-verbose", "-hooks=/etc/webhook/hooks.json", "-hotreload"]
    volumes:
      - /root/arifOS/deployment/hooks.json:/etc/webhook/hooks.json:ro
      - /root/arifOS/infrastructure/deploy_from_git.sh:/var/scripts/deploy_from_git.sh:ro
      - /root/arifOS:/usr/src/app:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - arifos_core_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webhook.rule=Host(`hook.arifosmcp.arif-fazil.com`)"
      - "traefik.http.routers.webhook.entrypoints=websecure"
      - "traefik.http.routers.webhook.tls.certresolver=letsencrypt"
      - "traefik.http.services.webhook.loadbalancer.server.port=9000"
    restart: unless-stopped

# ── arifOS MCP Substrate Services (Official Reference Layer) ──────────────
# Enabled per Priority Integration Order (EP-2026.04.11)
# ─────────────────────────────────────────────────────────────────

  mcp_time:
    image: mcp/server-time:latest
    container_name: mcp_time
    networks:
      - arifos_core_network
    restart: unless-stopped
    # 000 INIT epoch anchor

  mcp_filesystem:
    image: mcp/server-filesystem:latest
    container_name: mcp_filesystem
    volumes:
      - /root/arifOS:/usr/src/project:rw
    environment:
      - ALLOWED_DIRECTORIES=/usr/src/project
    networks:
      - arifos_core_network
    restart: unless-stopped
    # F1/F8/888 AUDIT access

  mcp_git:
    image: mcp/server-git:latest
    container_name: mcp_git
    volumes:
      - /root/arifOS:/usr/src/project:ro
    networks:
      - arifos_core_network
    restart: unless-stopped
    # F2 integrity layer

  mcp_memory:
    image: mcp/server-memory:latest
    container_name: mcp_memory
    networks:
      - arifos_core_network
    restart: unless-stopped
    # F3 alignment backbone

  mcp_fetch:
    image: mcp/server-fetch:latest
    container_name: mcp_fetch
    networks:
      - arifos_core_network
    restart: unless-stopped
    # F9 reality grounding

  mcp_everything:
    image: mcp/server-everything:latest
    container_name: mcp_everything
    networks:
      - arifos_core_network
    restart: unless-stopped
    # ─────────────────────────────────────────────────────────────
    # CONFORMANCE HARNESS: Protocol wind-tunnel only.
    # NOT for production metabolic paths.
    # ─────────────────────────────────────────────────────────────


volumes:

  ollama_models:
    external: true
    name: ollama

  arifosmcp_secrets:
    external: true
  arifosmcp_telemetry:
    driver: local
  arifosmcp_vault:
    driver: local

networks:
  arifos_core_network:
    name: arifos_core_network
    external: true
