# ── arifOS AI-First Unified Trinity Stack ──────────────────────────
# HARDENED PRODUCTION CONFIGURATION
# Version: 2026.03.12-SEAL-HARDENED
# ─────────────────────────────────────────────────────────────────

services:
  # --- Edge Router ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    init: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arifos_vault}
      POSTGRES_USER: ${POSTGRES_USER:-arifos_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/arifos/data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - arifos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arifos_admin} -d ${POSTGRES_DB:-arifos_vault}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: redis
    init: true
    command: redis-server --save 60 1 --loglevel warning --maxmemory 96mb --maxmemory-policy allkeys-lru
    volumes:
      - /opt/arifos/data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - arifos
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.core.somaxconn=511

  # --- Internal Memory Layers ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    init: true
    environment:
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=WARN
    volumes:
      - /opt/arifos/data/qdrant:/qdrant/storage
    networks:
      - arifos
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # --- LLM Engine ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-engine-prod
    init: true
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_PARALLEL=2
    volumes:
      - /opt/arifos/data/ollama:/root/.ollama
    networks:
      - arifos
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3072M
        reservations:
          cpus: '0.5'
          memory: 512M
    mem_limit: 3G
    mem_reservation: 512M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # --- Gateways & Reasoning ---
  openclaw:
    build:
      context: .
      dockerfile: infrastructure/openclaw/Dockerfile
    image: arifos/openclaw-forged:2026.03.14
    container_name: openclaw
    init: true
    user: root
    env_file:
      - path: .env.docker
        required: true
    volumes:
      - /opt/arifos/data/openclaw:/root/.openclaw
      - /opt/arifos/data/openclaw/bin:/root/.local/bin
      - /opt/arifos/data/openclaw/npm-global:/root/.npm-global
      - /opt/arifos/data/openclaw/gitconfig:/root/.gitconfig:ro
      - /root/arifOS:/mnt/arifos:rw
      - /opt/arifos/APEX-THEORY:/mnt/apex:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker:/usr/libexec/docker:ro
      - /usr/local:/host/usr-local:ro
      - /root/.local:/host/root-local:ro
      - /root/.claude:/host/root-claude:ro
      - /opt/arifos/data/openclaw/models:/home/node/.node-llama-cpp/models
      - /opt/arifos/data/openclaw/ssh:/root/.ssh:ro
      - /opt/arifos/data/openclaw/bin/arifos:/usr/local/bin/arifos:ro
      - /opt/arifos/data/openclaw/bin/claude:/usr/local/bin/claude:ro
      - /opt/arifos/data/openclaw/bin/codex:/usr/local/bin/codex:ro
      - /opt/arifos/data/openclaw/bin/gemini:/usr/local/bin/gemini:ro
      - /opt/arifos/data/openclaw/bin/jq:/usr/local/bin/jq:ro
      - /opt/arifos/data/openclaw/bin/gh:/usr/local/bin/gh:ro
      - /opt/arifos/data/openclaw/bin/rg:/usr/local/bin/rg:ro
      - /opt/arifos/data/openclaw/bin/mcporter:/usr/local/bin/mcporter:ro
      - /opt/arifos/data/openclaw/bin/oracle:/usr/local/bin/oracle:ro
      - /opt/arifos/data/openclaw/bin/oracle-mcp:/usr/local/bin/oracle-mcp:ro
      - /opt/arifos/data/openclaw/bin/xurl:/usr/local/bin/xurl:ro
      - /opt/arifos/data/openclaw/bin-wrappers:/host/clis:ro
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - OLLAMA_URL=http://ollama-engine-prod:11434
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--max-old-space-size=4096
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - PATH=/usr/local/sbin:/usr/local/bin:/root/.local/bin:/root/.npm-global/bin:/host/clis:/host/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - GH_TOKEN=${GITHUB_TOKEN:-}
      - BROWSERLESS_URL=http://headless_browser:3000
      - OLLAMA_API_BASE=http://ollama-engine-prod:11434
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - arifos
    ports:
      - "127.0.0.1:18789:18789"
    labels:
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18789/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started
      redis:
        condition: service_healthy

  # --- Constitutional Kernel ---
  arifos:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: arifos/arifos:latest
    container_name: arifos
    init: true
    working_dir: /usr/src/app
    env_file:
      - path: /etc/opt/arifos/.env
        required: true
      # Fallback for local development (FHS override takes precedence)
      # - path: .env.docker
      #   required: false
    volumes:
      - /opt/arifos/data/core:/usr/src/app/data:rw
      - /opt/arifos/data/minimax:/usr/src/app/data/minimax:rw
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /root/arifOS/arifos:/usr/src/app/:ro
      - /root/arifOS/arifos/server.py:/usr/src/app/server.py:ro
      - /root/arifOS/arifos/stdio_server.py:/usr/src/app/stdio_server.py:ro
      - /root/arifOS/arifos/fastmcp.json:/usr/src/app/fastmcp.json:ro
      - /root/arifOS/arifos/mcp.json:/usr/src/app/mcp.json:ro
      - /root/arifOS/arifos/core:/usr/src/app/core:ro
      - /root/arifOS/arifos/000:/usr/src/app/000:ro
      - /root/arifOS/arifos/333:/usr/src/app/333:ro
      - /root/arifOS/arifos/spec:/usr/src/app/spec:ro
      - /root/arifOS/arifos/sites:/usr/src/app/sites:ro
      - /opt/arifos/secrets:/opt/arifos/secrets:ro
      - arifos_telemetry:/usr/src/app/telemetry:rw
      - arifos_vault:/usr/src/app/VAULT999:rw
      - arifos_memory:/usr/src/app/memory:rw
    environment:
      HF_TOKEN: ${HF_TOKEN}
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /usr/src/app
      PYTHONDONTWRITEBYTECODE: 1
      ARIFOS_WORKDIR: /usr/src/app
      DATABASE_URL: postgresql://${POSTGRES_USER:-arifos_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arifos_vault}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama-engine-prod:11434
      BROWSERLESS_URL: http://headless_browser:3000
      OPENCLAW_URL: http://openclaw:18789
      # MiniMax credentials now sourced from .env.docker (F1 Amanah — persistent secrets)
      # MINIMAX_API_KEY and MINIMAX_GROUP_ID are loaded via env_file above
      DASHBOARD_ENABLED: "true"
      AAA_MCP_TRANSPORT: http
      ARIFOS_GOVERNANCE_SECRET_FILE: ${ARIFOS_GOVERNANCE_SECRET_FILE:-}
      ARIFOS_GOVERNANCE_SECRET: ${ARIFOS_GOVERNANCE_SECRET:-}
      ARIFOS_GOVERNANCE_SECRET_PREVIOUS_FILE: ${ARIFOS_GOVERNANCE_SECRET_PREVIOUS_FILE:-}
      ARIFOS_GOVERNANCE_SECRET_PREVIOUS: ${ARIFOS_GOVERNANCE_SECRET_PREVIOUS:-}
      ARIFOS_PUBLIC_TOOL_PROFILE: ${ARIFOS_PUBLIC_TOOL_PROFILE:-public}
      ARIFOS_ML_FLOORS: "1"
      arifos_PATH: ${arifos_PATH:-/mcp}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
      UVICORN_TIMEOUT: ${UVICORN_TIMEOUT:-120}
      PYTHONHASHSEED: 0
      PYTHONDETERMINISTICHASH: 1
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - arifos
    labels:
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3072M
        reservations:
          cpus: '0.5'
          memory: 1024M
    restart: unless-stopped
    pid: host
    privileged: true
    tmpfs:
      - /tmp:rw,size=128M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started

  # --- GEOX Earth Physics MCP ---
  geox-mcp:
    build:
      context: ./geox
      dockerfile: Dockerfile
    image: arifos/geox-mcp:latest
    container_name: geox-mcp
    init: true
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - ARIFOS_FLOORS_HASH=${ARIFOS_FLOORS_HASH:-}
      - ARIFOS_GOVERNANCE_URL=http://arifos:8080
    volumes:
      - /root/arifOS/geox:/app/geox:ro
      - geox_data:/app/data:rw
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      - arifos
    labels:
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    depends_on:
      arifos:
        condition: service_healthy

  # --- Monitoring Stack ---
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - arifos

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - arifos

  prometheus:
    image: prom/prometheus:latest
    container_name: arifos_prometheus
    init: true
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--log.level=warn'
    volumes:
      - /root/arifOS/arifos/infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/arifos/data/prometheus:/prometheus
    networks:
      - arifos
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M
        reservations:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:latest
    container_name: arifos_grafana
    init: true
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: https://monitor.arifos.arif-fazil.com
      GF_SERVER_DOMAIN: monitor.arifos.arif-fazil.com
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_BASIC_ENABLED: "true"
    volumes:
      - /opt/arifos/data/grafana:/var/lib/grafana
      - /root/arifOS/arifos/infrastructure/grafana/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - /root/arifOS/arifos/infrastructure/grafana/dashboards/arifos.yaml:/etc/grafana/provisioning/dashboards/arifos.yaml:ro
      - /root/arifOS/arifos/infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
    networks:
      - arifos
    labels:
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M
        reservations:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # --- Workflow Automation ---
  n8n:
    image: n8nio/n8n:latest
    container_name: arifos_n8n
    environment:
      N8N_HOST: flow.arifos.arif-fazil.com
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://flow.arifos.arif-fazil.com/
      N8N_EDITOR_BASE_URL: https://flow.arifos.arif-fazil.com/
      GENERIC_TIMEZONE: Asia/Kuala_Lumpur
      N8N_LOG_LEVEL: warn
      N8N_METRICS: "true"
      N8N_SKIP_WEBHOOK_DRIVERS: "true"
    volumes:
      - /opt/arifos/data/n8n:/home/node/.n8n
    networks:
      - arifos
    labels:
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M
        reservations:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # --- AAA Landing ---
  aaa-landing:
    image: nginx:alpine
    container_name: arifos_aaa_landing
    volumes:
      - ./sites/aaa-mcp-landing:/usr/share/nginx/html:ro
    networks:
      - arifos
    labels:
    restart: unless-stopped

  # --- Webhook Auto-Deploy ---
  webhook:
    image: almir/webhook:latest
    container_name: arifos_webhook
    init: true
    command: ["-verbose", "-hooks=/etc/webhook/hooks.json", "-hotreload"]
    volumes:
      - /root/arifOS/arifos/deployment/hooks.json:/etc/webhook/hooks.json:ro
      - /root/arifOS/arifos/infrastructure/deploy_from_git.sh:/var/scripts/deploy_from_git.sh:ro
      - /root/arifOS:/usr/src/app:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker:/usr/libexec/docker:ro
      - /var/scripts/restart_openclaw.sh:/var/scripts/restart_openclaw.sh:ro
      - /opt/arifos/data/triggers:/shared/triggers
      - /opt/arifos/data/openclaw/models:/home/node/.node-llama-cpp/models
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - OPENCLAW_RESTART_TOKEN=${OPENCLAW_RESTART_TOKEN}
    networks:
      - arifos
    labels:
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # --- Headless Browser ---
  headless_browser:
    image: ghcr.io/browserless/chromium:latest
    container_name: headless_browser
    init: true
    environment:
      - MAX_CONCURRENT_SESSIONS=2
      - CONNECTION_TIMEOUT=20000
      - PREBOOT_CHROME=true
      - DEBUG=browserless:error
      - ENABLE_CORS=true
      - DEFAULT_BLOCK_ADS=true
      - DEFAULT_IGNORE_HTTPS_ERRORS=true
      - DEFAULT_STEALTH=true
    networks:
      - arifos
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/docs || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2048M
        reservations:
          cpus: '0.25'
          memory: 512M
    mem_limit: 2G
    mem_reservation: 512M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # --- Developer Agent Workspace ---
  code-server:
    image: codercom/code-server:latest
    container_name: civ08_code_server
    init: true
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD:-arifos}
    volumes:
      - /srv/arifos/code:/home/coder/project:rw
      - /root/arifOS:/home/coder/:rw
    networks:
      - arifos
    labels:
    restart: unless-stopped

  # --- Document Intelligence Factory ---
  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: civ01_stirling_pdf
    init: true
    environment:
      - DOCKER_ENABLE_SECURITY=false
    volumes:
      - /opt/arifos/data/stirling:/tmp:rw
    networks:
      - arifos
    labels:
    restart: unless-stopped

  # --- Citizen Service Gateway ---
  evolution-api:
    image: atendai/evolution-api:v1.8.1
    container_name: civ03_evolution_api
    init: true
    environment:
      - SERVER_URL=https://whatsapp.arifos.arif-fazil.com
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-arifos-evo-key}
      - DATABASE_ENABLED=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/2
    volumes:
      - /opt/arifos/data/evolution:/evolution/instances:rw
    networks:
      - arifos
    labels:
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

networks:
  arifos:
    driver: bridge

volumes:
  arifos_telemetry:
    driver: local
  arifos_vault:
    driver: local
  arifos_memory:
    driver: local
  arifos_grafana_data:
    driver: local
  arifos_grafana_datasources:
    driver: local
  arifos_grafana_dashboards:
    driver: local
  geox_data:
    driver: local
