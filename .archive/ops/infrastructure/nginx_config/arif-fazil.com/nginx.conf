# arif-fazil.com + www
server {
    listen 80;
    server_name arif-fazil.com www.arif-fazil.com;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /arifos/ {
        alias /usr/share/nginx/html/arifos/;
        try_files $uri $uri/ /arifos/index.html;
    }

    location /aaa/ {
        alias /usr/share/nginx/html/aaa/;
        try_files $uri $uri/ /aaa/index.html;
    }

    location /apex/ {
        alias /usr/share/nginx/html/apex/;
        try_files $uri $uri/ /apex/index.html;
    }

    location /waw/ {
        alias /usr/share/nginx/html/waw/;
        try_files $uri $uri/ /waw/index.html;
    }

    location /forge/ {
        alias /usr/share/nginx/html/forge/;
        try_files $uri $uri/ /forge/index.html;
    }

    location /.well-known/ {
        alias /usr/share/nginx/html/.well-known/;
    }
}
