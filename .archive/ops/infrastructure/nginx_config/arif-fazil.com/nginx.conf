server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /.well-known/ {
        alias /usr/share/nginx/html/.well-known/;
    }
}

