# arif-sites — VPS static files nginx server
# Used with: docker run -d --network arifos_trinity --label "traefik.enable=true" ...
# IMPORTANT: Must add Traefik labels to container for subdomain routing
# See: infrastructure/nginx_config/arif-fazil.com/nginx.conf
services:
  arif-sites:
    image: nginx:alpine
    container_name: arif-sites
    networks:
      - arifos_trinity
    volumes:
      - /opt/arifos/sites/arif-fazil.com/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/arifos/sites/arif-fazil.com:/usr/share/nginx/html:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=10m
    security_opt:
      - no-new-privileges:true
