server {
    listen 80;
    server_name mcp.af-forge.io;
    
    location / {
        proxy_pass http://arifos-mcp:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /health {
        proxy_pass http://arifos-mcp:3000/health;
        access_log off;
    }
    
    location /build {
        proxy_pass http://arifos-mcp:3000/build;
        access_log off;
    }
}

server {
    listen 80;
    server_name localhost;
    
    location /widget/vault-seal {
        alias /var/www/arifos/widgets/vault-seal-widget.html;
        default_type text/html;
        
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; frame-ancestors https://chat.openai.com https://chatgpt.com; connect-src 'self';" always;
        add_header X-Frame-Options "ALLOW-FROM https://chat.openai.com" always;
        add_header Access-Control-Allow-Origin "https://chat.openai.com" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }
    
    location /widgets/ {
        alias /var/www/arifos/widgets/;
        autoindex off;
        
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-ancestors https://chat.openai.com https://chatgpt.com;" always;
        add_header Access-Control-Allow-Origin "https://chat.openai.com" always;
    }
}
