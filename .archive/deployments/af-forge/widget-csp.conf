# Nginx CSP Configuration for ChatGPT Widget
# Add to /etc/nginx/sites-available/mcp.af-forge.io

location /widgets/ {
    alias /var/www/arifos/widgets/;
    index index.html;
    
    # CSP required by ChatGPT Apps SDK
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://chat.openai.com; style-src 'self' 'unsafe-inline'; frame-ancestors https://chat.openai.com https://chatgpt.com; connect-src 'self' https://mcp.af-forge.io;" always;
    
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Access-Control-Allow-Origin "https://chat.openai.com" always;
}

location = /widget/vault-seal {
    alias /var/www/arifos/widgets/vault-seal-widget.html;
    
    # Strict CSP for iframe in ChatGPT
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'unsafe-inline' https://chat.openai.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; frame-ancestors https://chat.openai.com https://chatgpt.com; connect-src 'self';" always;
    
    add_header X-Frame-Options "ALLOW-FROM https://chat.openai.com" always;
    add_header Access-Control-Allow-Origin "https://chat.openai.com" always;
}
