# arifOS MCP — Docker Compose Stack
# ═══════════════════════════════════════════════════════════════════════════════
#
# Usage:
#   docker compose -f deployments/af-forge/docker-compose.yml up -d
#   docker compose -f deployments/af-forge/docker-compose.yml logs -f

version: "3.8"

services:
  # ─── arifOS MCP Server ─────────────────────────────────────────────────────
  arifos-mcp:
    build:
      context: ../..
      dockerfile: deployments/af-forge/Dockerfile
      args:
        ARIFOS_BUILD_SHA: ${ARIFOS_BUILD_SHA:-dev}
        ARIFOS_BUILD_TIME: ${ARIFOS_BUILD_TIME:-unknown}
        ARIFOS_APP_VERSION: ${ARIFOS_APP_VERSION:-2026.04.06}
    image: arifos-mcp:${ARIFOS_BUILD_SHA:-latest}
    container_name: arifos-mcp
    restart: unless-stopped
    
    ports:
      - "3000:3000"
    
    environment:
      # Transport
      ARIFOS_MCP_TRANSPORT: http
      ARIFOS_MCP_HOST: 0.0.0.0
      ARIFOS_MCP_PORT: 3000
      
      # Build info
      ARIFOS_BUILD_SHA: ${ARIFOS_BUILD_SHA:-dev}
      ARIFOS_BUILD_TIME: ${ARIFOS_BUILD_TIME:-unknown}
      ARIFOS_APP_VERSION: ${ARIFOS_APP_VERSION:-2026.04.06}
      
      # VPS Link (for Horizon gateway mode)
      ARIFOS_VPS_URL: ${ARIFOS_VPS_URL:-https://mcp.af-forge.io}
      
      # Secrets (mount via .env or Docker secrets)
      ARIFOS_GOVERNANCE_SECRET: ${ARIFOS_GOVERNANCE_SECRET:-}
      
      # Optional backends
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    
    volumes:
      # Widget files for CSP-served content
      - ../../static/widgets:/app/static/widgets:ro
      # Vault999 persistence (if using local vault)
      - vault999-data:/app/VAULT999
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    
    networks:
      - arifos-network

  # ─── Nginx Reverse Proxy (optional) ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: arifos-nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./widget-csp.conf:/etc/nginx/conf.d/widget-csp.conf:ro
      - ../../static/widgets:/var/www/arifos/widgets:ro
      - ./ssl:/etc/nginx/ssl:ro
    
    depends_on:
      - arifos-mcp
    
    networks:
      - arifos-network

  # ─── Qdrant (Vector DB) ────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: arifos-qdrant
    restart: unless-stopped
    
    ports:
      - "6333:6333"
    
    volumes:
      - qdrant-data:/qdrant/storage
    
    networks:
      - arifos-network

  # ─── Redis (Session Cache) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: arifos-redis
    restart: unless-stopped
    
    volumes:
      - redis-data:/data
    
    networks:
      - arifos-network

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  vault999-data:
    driver: local
  qdrant-data:
    driver: local
  redis-data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  arifos-network:
    driver: bridge
