# Railway Configuration for arifOS MCP Server (v55.3)
# NOTE: This file is used when Railway's service root is set to /deployments.
# If service root is repository root, use /railway.toml instead.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "codebase-mcp-sse"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
numReplicas = 1

[deploy.env]
ARIFOS_ENV = "production"
ARIFOS_VERSION = "v55.3-AAA-MCP"
ARIFOS_LOG_LEVEL = "INFO"
ARIFOS_CLUSTER = "3"
AAA_MCP_TRANSPORT = "sse"
HOST = "0.0.0.0"
PORT = "8080"
