# Nginx reverse proxy for arifOS MCP on AF-FORGE
# ═══════════════════════════════════════════════════════════════════════════════
#
# Domain:  mcp.af-forge.io
# Routes:  /mcp, /health, /ready, /build, /widget/vault-seal
#
# TLS SETUP (888_HOLD — human executes):
#   1. certbot certonly --webroot --webroot-path=/var/www/certbot -d mcp.af-forge.io
#   2. Copy certs to deployments/af-forge/ssl/ (see ssl/README.md)
#   3. Uncomment the HTTPS server block below
#   4. Restart: docker compose -f deployments/af-forge/docker-compose.yml restart nginx
#
# ROLLBACK:
#   Revert this file to previous server_name and run docker compose restart nginx

upstream arifos_mcp {
    server arifos-mcp:3000;
    keepalive 32;
}

# ─── HTTP server: challenge + redirect ────────────────────────────────────────
server {
    listen 80;
    server_name mcp.af-forge.io;

    # Let's Encrypt ACME HTTP challenge (safe to automate)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # After certs are live, switch to redirect:
    # return 301 https://$server_name$request_uri;

    # During initial setup (HTTP only), proxy directly:
    include /etc/nginx/conf.d/proxy-common.conf;

    # Widget — served from nginx static volume
    location /widget/ {
        alias /var/www/arifos/widgets/;
        default_type text/html;
        include /etc/nginx/conf.d/widget-csp.conf;
        try_files $uri $uri/ =404;
    }

    location /widget/vault-seal {
        alias /var/www/arifos/widgets/vault-seal-widget.html;
        default_type text/html;
        include /etc/nginx/conf.d/widget-csp.conf;
    }
}

