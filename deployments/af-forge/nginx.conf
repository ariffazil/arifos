# Nginx reverse proxy for arifOS MCP on AF-FORGE
# ═══════════════════════════════════════════════════════════════════════════════
#
# Domain: arifos.federation
# Routes: /mcp, /health, /ready, /build

# HTTP redirect to HTTPS (when TLS is configured)
server {
    listen 80;
    server_name arifos.federation;
    
    # For initial setup without TLS, proxy directly
    # After TLS setup, uncomment the redirect below:
    # return 301 https://$server_name$request_uri;
    
    # Temporary: proxy to upstream for HTTP-only testing
    include /etc/nginx/conf.d/proxy-common.conf;
}

# HTTPS server (when TLS certificates are available)
server {
    listen 443 ssl http2;
    server_name arifos.federation;
    
    # TLS Configuration (888 HOLD until certs are provisioned)
    # ssl_certificate /etc/nginx/ssl/arifos.federation.crt;
    # ssl_certificate_key /etc/nginx/ssl/arifos.federation.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    
    include /etc/nginx/conf.d/proxy-common.conf;
}

# Widget CSP configuration for ChatGPT Apps
server {
    listen 80;
    server_name widget.arifos.federation;
    
    location /vault-seal {
        alias /var/www/arifos/widgets/vault-seal-widget.html;
        default_type text/html;
        
        # CSP for ChatGPT Apps iframe embedding
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; frame-ancestors https://chat.openai.com https://chatgpt.com; connect-src 'self';" always;
        add_header X-Frame-Options "ALLOW-FROM https://chat.openai.com" always;
        add_header Access-Control-Allow-Origin "https://chat.openai.com" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }
    
    location / {
        alias /var/www/arifos/widgets/;
        autoindex off;
        
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-ancestors https://chat.openai.com https://chatgpt.com;" always;
        add_header Access-Control-Allow-Origin "https://chat.openai.com" always;
    }
}
