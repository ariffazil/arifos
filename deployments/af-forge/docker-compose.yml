# arifOS MCP — AF-FORGE Docker Compose Stack
# ═══════════════════════════════════════════════════════════════════════════════
#
# Usage:
#   cd deployments/af-forge
#   export ARIFOS_BUILD_SHA=$(git rev-parse --short HEAD)
#   export ARIFOS_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
#   docker compose up -d --build
#   docker compose logs -f

version: "3.8"

services:
  # ─── arifOS MCP Server ─────────────────────────────────────────────────────
  arifos-mcp:
    build:
      context: ../..
      dockerfile: deployments/af-forge/Dockerfile
      args:
        ARIFOS_BUILD_SHA: ${ARIFOS_BUILD_SHA:-dev}
        ARIFOS_BUILD_TIME: ${ARIFOS_BUILD_TIME:-unknown}
        ARIFOS_APP_VERSION: ${ARIFOS_APP_VERSION:-2026.04.07}
    image: arifos-mcp:af-forge
    container_name: arifos-mcp
    restart: unless-stopped
    
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:8080:3000"
    
    environment:
      # Transport (HTTP/streamable-http for production)
      ARIFOS_MCP_TRANSPORT: http
      ARIFOS_MCP_HOST: 0.0.0.0
      ARIFOS_MCP_PORT: 3000
      
      # Build info
      ARIFOS_BUILD_SHA: ${ARIFOS_BUILD_SHA:-dev}
      ARIFOS_BUILD_TIME: ${ARIFOS_BUILD_TIME:-unknown}
      ARIFOS_APP_VERSION: ${ARIFOS_APP_VERSION:-2026.04.07}
      GIT_COMMIT: ${ARIFOS_BUILD_SHA:-dev}
      
      # Federation endpoint (for reference)
      ARIFOS_VPS_URL: ${ARIFOS_VPS_URL:-https://arifos.federation}
      
      # Secrets (mount via .env or Docker secrets - NOT in compose)
      # ARIFOS_GOVERNANCE_SECRET: ${ARIFOS_GOVERNANCE_SECRET:-}
    
    volumes:
      # Widget files for CSP-served content
      - ../../static/widgets:/app/static/widgets:ro
      # Vault999 persistence
      - vault999-data:/app/VAULT999
      # Telemetry
      - telemetry-data:/app/telemetry
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - arifos-network

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: arifos-nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./widget-csp.conf:/etc/nginx/conf.d/widget-csp.conf:ro
      - ../../static/widgets:/var/www/arifos/widgets:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    
    depends_on:
      - arifos-mcp
    
    networks:
      - arifos-network

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  vault999-data:
    driver: local
  telemetry-data:
    driver: local
  certbot-webroot:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  arifos-network:
    driver: bridge
