# Common proxy configuration for arifOS MCP
# ═══════════════════════════════════════════════════════════════════════════════

# MCP Protocol endpoint
location /mcp {
    proxy_pass http://arifosmcp:3000/mcp;
    proxy_http_version 1.1;
    
    # Streaming support (critical for SSE)
    proxy_buffering off;
    proxy_cache off;
    
    # Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Timeouts (long for tool calls)
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;
    
    # SSE support
    proxy_set_header Connection '';
    chunked_transfer_encoding off;
}

# Health check endpoint
location /health {
    proxy_pass http://arifos-mcp:3000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
}

# Readiness check endpoint
location /ready {
    proxy_pass http://arifos-mcp:3000/ready;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
}

# Build info endpoint
location /build {
    proxy_pass http://arifos-mcp:3000/build;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
}

# Dashboard (static files)
location /dashboard {
    proxy_pass http://arifos-mcp:3000/dashboard;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}

# Tools list
location /tools {
    proxy_pass http://arifos-mcp:3000/tools;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}

# Root - redirect to dashboard
location / {
    proxy_pass http://arifos-mcp:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
