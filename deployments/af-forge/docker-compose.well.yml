networks:
  arifos_core_network:
    external: true

services:
  well:
    build:
      context: /root/well
      dockerfile: Dockerfile
    image: ghcr.io/ariffazil/well:latest
    container_name: well
    ports:
      - "127.0.0.1:8091:8083"
    volumes:
      - /root/WELL:/root/WELL
      - /root/arifOS/core/vault999:/root/arifOS/core/vault999
    environment:
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: 8083
      WELL_STATE_PATH: /root/WELL/state.json
      WELL_EVENTS_PATH: /root/WELL/events.jsonl
      WELL_VAULT_PATH: /root/arifOS/core/vault999/well_ledger.jsonl
      LOG_LEVEL: info
    restart: unless-stopped
    networks:
      - arifos_core_network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s