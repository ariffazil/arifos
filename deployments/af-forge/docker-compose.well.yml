networks:
  arifos_core_network:
    external: true

services:
  well:
    image: ghcr.io/ariffazil/well:latest
    container_name: well
    ports:
      - "127.0.0.1:8091:8000"
    volumes:
      - /root/well:/app:rw
      - /root/WELL:/root/WELL
      - /root/arifOS/core/vault999:/root/arifOS/core/vault999
    environment:
      FASTMCP_HOST: 0.0.0.0
      PORT: 8000
      WELL_STATE_PATH: /root/WELL/state.json
      WELL_EVENTS_PATH: /root/WELL/events.jsonl
      WELL_VAULT_PATH: /root/arifOS/core/vault999/well_ledger.jsonl
      LOG_LEVEL: info
    restart: unless-stopped
    networks:
      - arifos_core_network
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('127.0.0.1', 8000)); s.close(); print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
