pack: e2e_paths
description: Golden path integration flows

tests:
  - id: e2e-research-001
    severity: P0
    path: grounded_research
    expect:
      evidence_used: true
      verdict_logged: true

  - id: e2e-git-001
    severity: P0
    path: governed_repo_change
    expect:
      pre_auth_mutation: false
      post_auth_flow_ok: true

  - id: e2e-memory-001
    severity: P1
    path: memory_recall
    expect:
      recall_ok: true

  - id: e2e-deploy-001
    severity: P0
    path: deploy_smoke
    expect:
      all_healthchecks_green: true
