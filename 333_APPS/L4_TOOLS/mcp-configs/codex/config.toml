# arifOS Standard MCP Configuration (Option B) for Codex CLI - TIER 0-2
# Place this file at: ~/.codex/config.toml
# This is a TOML format file (not JSON)

[features]
shell_tool = false

[mcp_servers.aaa-mcp]
command = "C:\\Users\\User\\arifOS\\.venv\\Scripts\\python.exe"
args = ["-m", "codebase.mcp", "stdio"]
cwd = "C:\\Users\\User\\arifOS"
env = { 
  PYTHONPATH = "C:/Users/User/arifOS",
  ARIFOS_CONSTITUTIONAL_MODE = "AAA",
  PYTHONIOENCODING = "utf-8",
  PYTHONUNBUFFERED = "1"
}

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "C:/Users/User/arifOS"]

[mcp_servers.fetch]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-fetch"]

[mcp_servers.git]
command = "uvx"
args = ["mcp-server-git", "--repository", "C:/Users/User/arifOS"]

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.time]
command = "uvx"
args = ["mcp-server-time"]

[mcp_servers.sqlite]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sqlite", "C:/Users/User/arifOS/data"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
env = { CONTEXT7_API_KEY = "${CONTEXT7_API_KEY}" }

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env = { GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}" }

[mcp_servers.brave-search]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-brave-search"]
env = { BRAVE_API_KEY = "${BRAVE_API_KEY}" }
