# Codex template (project layer).
# Copy this file to: C:\Users\User\arifOS\.codex\config.toml

model = "gpt-5.3-codex"
model_reasoning_effort = "high"
personality = "pragmatic"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"

[features]
multi_agent = true

[mcp_servers.aaa-mcp]
enabled = true
required = true
startup_timeout_sec = 180
tool_timeout_sec = 120
command = "C:\\Users\\User\\arifOS\\.venv\\Scripts\\python.exe"
args = ["-m", "arifos_aaa_mcp", "stdio"]
cwd = "C:\\Users\\User\\arifOS"
enabled_tools = [
  "anchor_session",
  "reason_mind",
  "recall_memory",
  "simulate_heart",
  "critique_thought",
  "eureka_forge",
  "apex_judge",
  "seal_vault",
  "search_reality",
  "fetch_content",
  "inspect_file",
  "audit_rules",
  "check_vital",
  "metabolic_loop",
]

[mcp_servers.aaa-mcp.env]
PYTHONPATH = "C:/Users/User/arifOS"
ARIFOS_CONSTITUTIONAL_MODE = "AAA"
PYTHONIOENCODING = "utf-8"
PYTHONUNBUFFERED = "1"

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[agents.explorer]
description = "Read-only mapper for code paths, contracts, and evidence."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Read-only reviewer for correctness, security, and test risk."
config_file = "agents/reviewer.toml"

[agents.worker]
description = "Implementation-focused worker for minimal, validated edits."
config_file = "agents/worker.toml"

[agents.docs_researcher]
description = "Documentation verifier using docs MCP for API-grounded answers."
config_file = "agents/docs-researcher.toml"

[agents.monitor]
description = "Long-running monitor for polling, waiting, and status checks."
config_file = "agents/monitor.toml"
