# Docker Secrets Configuration for arifOS
# DITEMPA BUKAN DIBERI — Forged, Not Given
#
# This file extends docker-compose.yml with Docker Secrets support.
# To use: docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
#
# Prerequisites:
#   1. Initialize swarm: docker swarm init
#   2. Create secrets: /opt/arifos/secrets/manage-secrets.sh init

version: "3.8"

services:
  arifosmcp:
    secrets:
      - arifos_openai_api_key
      - arifos_anthropic_api_key
      - arifos_session_secret
      - arifos_governance_secret
    environment:
      # Secrets are mounted as files, read them in entrypoint or app
      OPENAI_API_KEY_FILE: /run/secrets/arifos_openai_api_key
      ANTHROPIC_API_KEY_FILE: /run/secrets/arifos_anthropic_api_key
      SESSION_SECRET_FILE: /run/secrets/arifos_session_secret
      GOVERNANCE_SECRET_FILE: /run/secrets/arifos_governance_secret
      # Fallback to env vars if secrets not available
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  geox_eic:
    secrets:
      - source: arifos_session_secret
        target: geo_session_secret
    environment:
      GEOX_SESSION_SECRET_FILE: /run/secrets/geo_session_secret

  # Example: PostgreSQL with secret password
  postgres:
    secrets:
      - arifos_postgres_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/arifos_postgres_password

# Define secrets (must be created before use with: docker secret create)
secrets:
  arifos_openai_api_key:
    external: true
  arifos_anthropic_api_key:
    external: true
  arifos_session_secret:
    external: true
  arifos_governance_secret:
    external: true
  arifos_postgres_password:
    external: true
