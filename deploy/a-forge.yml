# A-FORGE Bridge — docker-compose for af-bridge-prod
# Secrets loaded from /root/.secrets/a-forge.env (chmod 600)
# Usage: docker compose -f /root/compose/a-forge.yml up -d
version: "3.8"

services:
  af-bridge-prod:
    image: ghcr.io/ariffazil/a-forge:9002408
    container_name: af-bridge-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:7071:7071"
    environment:
      - NODE_ENV=production
      - AF_FORGE_PORT=7071
      - ARIFOS_GOVERNANCE_URL=http://arifosmcp:8080
      # All provider secrets (MINIMAX_API_KEY, SEA_LION_API_KEY, etc.)
      # are loaded from /root/.secrets/a-forge.env via env_file below.
    env_file:
      - /root/.secrets/a-forge.env
    networks:
      - arifos_core_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7071/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  arifos_core_network:
    external: true
