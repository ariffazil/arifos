# -----------------------------------------------------------------------------
# Deterministic Hold Patterns (no-LLM path — always enforced)
# ATOMIC: immediate HOLD, no execution possible
# HIGH:   immediate HOLD, requires human confirmation
# MEDIUM: CAUTION, proceed with monitoring
# -----------------------------------------------------------------------------
hold_patterns:
  atomic:
    - pattern: "rm\\s+-rf\\s+/\\s*$"
      reason: "F9 F13 ATOMIC: recursive root delete"
    - pattern: "rm\\s+-rf\\s+/var"
      reason: "F9 F13 ATOMIC: system dir wipe"
    - pattern: "rm\\s+-rf\\s+/etc"
      reason: "F9 F13 ATOMIC: config dir wipe"
    - pattern: "mkfs"
      reason: "F13 ATOMIC: filesystem destruction"
    - pattern: "fdisk"
      reason: "F13 ATOMIC: partition table destruction"
    - pattern: "parted.*mklabel"
      reason: "F13 ATOMIC: partition destruction"
    - pattern: "dd\\s+if=/dev/zero\\s+of=/dev/"
      reason: "F13 ATOMIC: raw disk wipe"
    - pattern: "iptables\\s+-F\\s*$"
      reason: "F13 ATOMIC: firewall flush"
    - pattern: "iptables\\s+-t\\s+nat\\s+-F"
      reason: "F13 ATOMIC: NAT table flush"
    - pattern: "curl\\s+.*\\|\\s*sh"
      reason: "F9 F13 ATOMIC: remote exec via pipe"
    - pattern: "curl\\s+.*\\|\\s*sudo\\s+bash"
      reason: "F9 F13 ATOMIC: sudo remote exec"
    - pattern: "DROP\\s+DATABASE"
      reason: "F13 ATOMIC: database destruction"
    - pattern: "shutdown"
      reason: "F13 ATOMIC: system shutdown"
    - pattern: "reboot"
      reason: "F13 ATOMIC: system reboot"
    - pattern: ":\\(\\)\\s*:\\s*\\|\\s*:\\s*&"
      reason: "F9 ATOMIC: fork bomb"
  high:
    - pattern: "chmod\\s+-R\\s+777\\s+/"
      reason: "F9: world-writable system"
    - pattern: "chown\\s+-R\\s+root\\s+/"
      reason: "F9 F13: ownership takeover"
    - pattern: "systemctl\\s+mask"
      reason: "F13 HIGH: service masking"
    - pattern: "git\\s+push\\s+--force\\s+.*main"
      reason: "F13 HIGH: main branch force push"
    - pattern: "eval\\s+\\$\\("
      reason: "F9 HIGH: eval injection"
  caution:
    - pattern: "git\\s+push\\s+--force"
      reason: "F13 CAUTION: force push"
    - pattern: "systemctl\\s+(stop|restart)"
      reason: "F13 CAUTION: service control"
    - pattern: "chmod\\s+-R\\s+777"
      reason: "F9 CAUTION: broad permission change"
    - pattern: "docker\\s+rm\\s+-f"
      reason: "F9 CAUTION: container destruction"

# -----------------------------------------------------------------------------
# Critical Services (protected — systemctl stop/restart always CAUTION+)
# -----------------------------------------------------------------------------
critical_services:
  - ssh
  - sshd
  - systemd
  - network
  - firewalld
  - docker
  - nginx
  - apache2
  - mysql
  - postgresql

# -----------------------------------------------------------------------------
# IPC & Network
# -----------------------------------------------------------------------------
ipc:
  socket_path: "/run/arifos.sock"
  socket_mode: "0770"
  http_host: "127.0.0.1"
  http_port: 8081

# -----------------------------------------------------------------------------
# Storage paths
# -----------------------------------------------------------------------------
storage:
  vault_path: "/var/lib/arifos/vault999"
  plans_path: "/var/lib/arifos/plans"
  seals_path: "/var/lib/arifos/seals"
  sessions_path: "/var/lib/arifos/sessions"
  log_path: "/var/log/arifos"

# -----------------------------------------------------------------------------
# MCP Runtime
# -----------------------------------------------------------------------------
mcp:
  transport: "stdio"       # stdio | http | both
  protocol_version: "2024-11-05"
  tools_refresh_interval: 300  # seconds
  provider_mode: "no-model"  # no-model | local | external

# -----------------------------------------------------------------------------
# Install metadata
# -----------------------------------------------------------------------------
install:
  install_epoch: "PENDING"
  install_human: "Arif Fazil"
  install_id: "PENDING"
  rollback_epoch: "NONE"
  rollback_id: "NONE"