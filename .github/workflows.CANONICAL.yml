  - pattern: 888-judge.yml
    reason: Not a valid workflow — 888_JUDGE is a tool, not a CI

  - pattern: constitutional-eval.yml
    reason: Absorbed into 01-unified-ci.yml

  - pattern: deployment-gates.yml
