canonical_workflows:
  # ── Required CI ───────────────────────────────────────────
  - filename: 01-unified-ci.yml
    purpose: Consolidated constitutional verification — F1-F13 gates, tests, lint
    runs_on: [push main, pull_request main, merge_group, schedule daily]
    required_check: arifOS Unified CI
    risk: low
    can_deploy: false

  - filename: 02-aaa-seal.yml
    purpose: AAA structural audit — directory integrity, constitutional invariant checks
    runs_on: [push main paths AAA/arifosmcp/core, schedule daily]
    required_check: AAA Seal Integrity
    risk: low
    can_deploy: false

  - filename: 03-secrets-gate.yml
    purpose: F11 secrets gate — Gitleaks full history scan, hardcoded credential block
    runs_on: [push main, pull_request main, merge_group]
    required_check: F11 — Gitleaks Full History Scan
    risk: medium
    can_deploy: false

  - filename: 06-mcp-conformance.yml
    purpose: MCP spec compliance — tool surface, transport, schema conformance
    runs_on: [push main paths arifosmcp/transport/**, arifosmcp/tools/**]
    required_check: 🔌 MCP Conformance
    risk: low
    can_deploy: false

  - filename: sentinel-premerge-gate.yml
    purpose: "Pre-merge semantic gate — 3-question block: critical paths, forbidden paths, SABAR state"
    runs_on: [pull_request main, merge_group]
    required_check: 🛡️ Sentinel Gate
    risk: low
    can_deploy: false

  - filename: repo-routing-validation.yml
    purpose: REPO trailer enforcement — every commit must declare its target repo
    runs_on: [pull_request, merge_group]
    required_check: Repo Routing Validation
    risk: low
    can_deploy: false

  # ── Supporting CI ──────────────────────────────────────────
  - filename: 04-uptime-monitor.yml
    purpose: Synthetic health checks — arifOS, GEOX, WEALTH, WELL endpoints
    runs_on: [schedule every 5 min]
    required_check: null  # informational, not blocking
    risk: low
    can_deploy: false

  - filename: 05-law-sync.yml
    purpose: Living law sync — CLAUDE.md / AGENTS.md drift detection
    runs_on: [push main paths CLAUDE.md, AGENTS.md, docs/**]
    required_check: null
    risk: low
    can_deploy: false

  - filename: 07-publish-pypi.yml
    purpose: Publish arifOS to PyPI — only on version tags
    runs_on: [push tags v*]
    required_check: null
    risk: high
    can_deploy: false

  # ── Automation ─────────────────────────────────────────────
  - filename: auto-merge-dependabot.yml
    purpose: Dependabot auto-merge — python, github-actions, minor/patch groups
    runs_on: [schedule daily]
    required_check: null
    risk: low
    can_deploy: false

  - filename: deploy.yml
    purpose: Deploy to VPS — triggers on main push, requires arifOS Unified CI pass
    runs_on: [push main, workflow_dispatch]
    required_check: null
    risk: high
    can_deploy: true

  - filename: repo-hygiene-weekly.yml
    purpose: Weekly hygiene — canonical workflow presence, forbidden check, stale runs
    runs_on: [schedule weekly]
    required_check: null
    risk: low
    can_deploy: false

  - filename: prune-images.yml
    purpose: Weekly Docker image prune — remove dangling images, report disk savings
    runs_on: [schedule weekly]
    required_check: null
    risk: medium
    can_deploy: false

