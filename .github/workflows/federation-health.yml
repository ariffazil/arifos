name: Federation Health Dashboard

on:
  schedule:
    - cron: "0 3 * * 1"  # Monday 03:00 UTC (11:00 MYT) — after per-repo digests
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: federation-health
  cancel-in-progress: false

jobs:
  dashboard:
    name: 🌐 Federation Health Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Build federation health report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          WEEK=$(date -u +%Y-%m-%d)
          REPORT=federation-report.md

          declare -A TIERS=( ["arifOS"]="infra" ["AAA"]="infra" ["A-FORGE"]="core"
            ["well"]="core" ["geox"]="core" ["wealth"]="core" ["arif-sites"]="site" )

          {
            echo "## 🌐 Federation Health — $WEEK"
            echo ""
            echo "| Repo | Tier | Last CI | Open PRs | Dependabot | Status |"
            echo "|---|---|---|---|---|---|"
          } > "$REPORT"

          ALL_GREEN=true
          ALERTS=""

          for repo_path in arifOS AAA A-FORGE well geox wealth arif-sites; do
            SLUG="ariffazil/$repo_path"
            TIER="${TIERS[$repo_path]:-unknown}"

            LAST_RUN=$(gh run list --repo "$SLUG" --limit 1 \
              --json conclusion --jq '.[0].conclusion // "unknown"' 2>/dev/null || echo "unknown")

            OPEN_PRS=$(gh pr list --repo "$SLUG" --state open \
              --json number --jq 'length' 2>/dev/null || echo "?")

            DEP_PRS=$(gh pr list --repo "$SLUG" --state open \
              --author "app/dependabot" --json number --jq 'length' 2>/dev/null || echo "?")

            case "$LAST_RUN" in
              success)   STATUS="✅ green" ;;
              failure)   STATUS="🔴 FAIL"; ALL_GREEN=false; ALERTS="$ALERTS\n- $repo_path last CI failed" ;;
              cancelled) STATUS="⚠️ cancelled" ;;
              *)         STATUS="⚪ $LAST_RUN" ;;
            esac

            if [ "$DEP_PRS" != "?" ] && [ "$DEP_PRS" -gt 5 ]; then
              ALERTS="$ALERTS\n- $repo_path has $DEP_PRS Dependabot PRs open"
            fi

            echo "| \`$repo_path\` | $TIER | \`$LAST_RUN\` | $OPEN_PRS | $DEP_PRS | $STATUS |" >> "$REPORT"
          done

          {
            echo ""
            if $ALL_GREEN; then
              echo "### ✅ All systems green"
            else
              echo "### ⚠️ Action required — see alerts below"
            fi
            echo ""
            echo "### Alerts"
            if [ -n "$ALERTS" ]; then
              printf "%b\n" "$ALERTS"
            else
              echo "_none_"
            fi
            echo ""
            echo "### Federation Ports"
            echo "| Service | Port | Tier |"
            echo "|---|---|---|"
            echo "| arifOS governance kernel | 8088 | infra |"
            echo "| AAA control plane | 80/443 | infra |"
            echo "| A-FORGE agent runtime | 7071 | core |"
            echo "| WELL substrate | 18083 | core |"
            echo "| GEOX earth engine | 8081 | core |"
            echo "| WEALTH capital engine | 18082 | package |"
            echo "| arif-sites | 443 | site |"
            echo ""
            echo "### Governance Checklist"
            echo "- [ ] All required checks passing on main"
            echo "- [ ] No stale Dependabot PRs > 14 days"
            echo "- [ ] No forbidden workflows (checked by 02-aaa-seal)"
            echo "- [ ] VAULT999 ledger: healthy"
            echo "- [ ] Hermes ASI: responsive on Telegram"
            echo ""
            echo "---"
            echo "_Auto-generated by \`federation-health.yml\` in \`ariffazil/arifOS\`_"
          } >> "$REPORT"

          gh issue create \
            --repo ariffazil/arifOS \
            --title "🌐 Federation Health — $WEEK" \
            --body-file "$REPORT" \
            --label "automation" || true

          echo "Dashboard issue created for $WEEK"
