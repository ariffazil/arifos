# arifOS — Secrets Scan (888 Guard)
# F11 Authority: Blocks any push containing hardcoded secrets.
# Scans full git history and working tree.
# If this fails → 888 HOLD → DO NOT deploy.

name: 🔐 F11 Secrets Gate

on:
  push:
    branches: [main, aaa-mcp-induction]
  pull_request:
    branches: [main, aaa-mcp-induction]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: F11 — Gitleaks Full History Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config-path: .gitleaks.toml
        continue-on-error: false

      - name: Custom pattern guard (HF, Telegram, AWS, GitHub tokens)
        run: |
          echo "🔍 F11 Custom Secrets Scan..."
          FAILED=0
          
          # HuggingFace tokens: hf_[A-Za-z0-9]{20,}
          echo "Checking for HF tokens..."
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs -r grep -lnE "hf_[A-Za-z0-9]{20,}" 2>/dev/null; then
            echo "🚨 888 HOLD — HF_TOKEN found in changed files"
            FAILED=1
          fi
          
          # Telegram bot tokens: 9-10 digit chat_id : A{33}
          echo "Checking for Telegram tokens..."
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs -r grep -lnE "[0-9]{9,10}:AA[A-Za-z0-9_-]{33}" 2>/dev/null; then
            echo "🚨 888 HOLD — Telegram bot token found"
            FAILED=1
          fi
          
          # AWS keys: AKIA[0-9A-Z]{16}
          echo "Checking for AWS keys..."
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs -r grep -lnE "AKIA[0-9A-Z]{16}" 2>/dev/null; then
            echo "🚨 888 HOLD — AWS key found"
            FAILED=1
          fi
          
          # GitHub PATs: ghp_[a-zA-Z0-9]{36}
          echo "Checking for GitHub PATs..."
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs -r grep -lnE "ghp_[a-zA-Z0-9]{36}" 2>/dev/null; then
            echo "🚨 888 HOLD — GitHub PAT found"
            FAILED=1
          fi
          
          if [ $FAILED -eq 1 ]; then exit 1; fi
          echo "Custom scan: CLEAN"