# arifOS — Secrets Scan (888 Guard)
# F11 Authority: Blocks any push containing hardcoded secrets.
# Scans full git history and working tree.
# If this fails → 888 HOLD → DO NOT deploy.

name: 🔐 F11 Secrets Gate

on:
  push:
    branches: [main, aaa-mcp-induction]
  pull_request:
    branches: [main, aaa-mcp-induction]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: F11 — Gitleaks Full History Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan
        uses: gitleaks/gitleaks-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config-path: .gitleaks.toml
        continue-on-error: false