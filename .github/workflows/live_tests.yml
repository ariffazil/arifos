name: arifOS Constitutional Live Tests

on:
  push:
    branches: ["main", "v60*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-constitutional-floors:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run MCP Live Tests (v2)
        run: |
          # Use the new v2 wrapper in CI mode (generates JSON output)
          python test_all_tools_live.py --ci
        env:
          AAA_MCP_OUTPUT_MODE: debug
          ARIFOS_PHYSICS_DISABLED: 1
          ARIFOS_ALLOW_LEGACY_SPEC: 1

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: constitutional-test-results
          path: test-results.json
