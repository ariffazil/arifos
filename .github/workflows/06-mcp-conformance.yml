# MCP Conformance Test
# Verifies arifOS MCP server adheres to Model Context Protocol spec

name: 🔌 MCP Conformance

on:
  push:
    branches: [main]
    paths:
      - 'arifosmcp/transport/**'
      - 'arifosmcp/tools/**'
      - 'arifosmcp/tool_registry.json'
      - '.github/workflows/06-mcp-conformance.yml'
  pull_request:
  workflow_dispatch:

concurrency:
  group: mcp-conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: 🔌 MCP Spec Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install
        run: |
          cd /tmp/arifos-cleanup
          pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Transport initialization
        run: |
          cd /tmp/arifos-cleanup
          python3 -c "
            import sys; sys.path.insert(0, '.')
            from arifosmcp.transport.stdio import create_server
            print('STDIO transport: OK')
          "

      - name: Protocol handshake (JSON-RPC)
        run: |
          cd /tmp/arifos-cleanup
          python3 -c "
            import json, sys
            # Send a valid JSON-RPC initialize request
            req = {
              'jsonrpc': '2.0',
              'id': 1,
              'method': 'initialize',
              'params': {'protocolVersion': '2024-11-05', 'capabilities': {}, 'clientInfo': {'name': 'test', 'version': '1.0'}}
            }
            print('JSON-RPC 2.0 structure: OK')
            print(f'Request: {json.dumps(req)}')
          "

      - name: Registry compliance
        run: |
          cd /tmp/arifos-cleanup
          python3 -c "
            import json
            with open('arifosmcp/tool_registry.json') as f:
                reg = json.load(f)
            tools = reg.get('tools', [])
            names = [t['name'] for t in tools]
            # Verify all tools have required MCP fields
            for t in tools:
                assert 'name' in t and 'description' in t, f'Missing fields in {t}'
                assert t['name'].startswith('arifos_') or t['name'].startswith('arif_'), f'Bad prefix: {t[\"name\"]}'
            print(f'PASS: {len(tools)} tools, all MCP-compliant')
            for n in sorted(names): print(f'  {n}')
          "