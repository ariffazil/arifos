# MCP Conformance Test
# Verifies arifOS MCP server adheres to Model Context Protocol spec

name: 🔌 MCP Conformance

on:
  push:
    branches: [main]
    paths:
      - 'arifosmcp/transport/**'
      - 'arifosmcp/tools/**'
      - 'arifosmcp/tool_registry.json'
      - '.github/workflows/06-mcp-conformance.yml'
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: mcp-conformance-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKDIR: "${{ github.workspace }}"

jobs:
  conformance:
    name: 🔌 MCP Spec Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install
        run: |
          cd "$WORKDIR"
          pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Transport initialization
        run: |
          cd "$WORKDIR"
          python3 -c "
          import sys; sys.path.insert(0, '.')
          from arifosmcp.transport.stdio import run_stdio
          print('STDIO transport: OK')
          "

      - name: Protocol handshake (JSON-RPC)
        run: |
          cd "$WORKDIR"
          python3 -c "
            import json, sys
            # Send a valid JSON-RPC initialize request
            req = {
              'jsonrpc': '2.0',
              'id': 1,
              'method': 'initialize',
              'params': {'protocolVersion': '2024-11-05', 'capabilities': {}, 'clientInfo': {'name': 'test', 'version': '1.0'}}
            }
            print('JSON-RPC 2.0 structure: OK')
            print(f'Request: {json.dumps(req)}')
          "

      - name: Registry compliance
        run: |
          cd "$WORKDIR"
          python3 -c "
          import json
          with open('arifosmcp/tool_registry.json') as f:
              reg = json.load(f)
          tools = reg.get('tools', {})
          # tools is a dict: {name: spec}
          names = sorted(tools.keys())
          # Verify all tools have required MCP fields
          allowed = ('arif_', 'arifos_', 'hermes_', 'forge_', 'mcp_')
          for name, spec in tools.items():
              assert 'description' in spec, f'Missing description in {name}'
              assert any(name.startswith(p) for p in allowed), f'Bad prefix: {name}'
          print(f'PASS: {len(tools)} tools, all MCP-compliant')
          for n in names: print(f'  {n}')
          "
