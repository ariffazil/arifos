name: Sync Living Law
on:
  push:
    paths: ['000/**', 'CLAUDE.md']
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update Constitutional Gist
        env:
          GITHUB_TOKEN: ${{ secrets.LAW_GIST_TOKEN }}
          GIST_ID: 81314f6cda1ea898f9feb88ce8f8959b
        run: |
          echo "Syncing Constitutional Law and Doctrine to Gist $GIST_ID"
          
          # Push both Constitution and Doctrine as separate files in the same gist
          curl -X PATCH \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"files\": {
                \"000_CONSTITUTION.md\": {\"content\": $(jq -Rs . < 000/000_CONSTITUTION.md)},
                \"000_DOCTRINE.md\": {\"content\": $(jq -Rs . < 000/000_DOCTRINE.md)}
              }
            }" \
            https://api.github.com/gists/$GIST_ID
