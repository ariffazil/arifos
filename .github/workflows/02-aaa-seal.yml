# arifOS — AAA Seal Integrity Check
# Verifies structural integrity, constitutional invariants, and entrypoint health.
# F1 Amanah: read-only, no side effects.

name: AAA Seal Integrity

on:
  push:
    branches: [main]
    paths:
      - 'AAA/**'
      - 'arifosmcp/**'
      - 'core/**'
      - 'pyproject.toml'
      - '.github/workflows/02-aaa-seal.yml'
  schedule:
    - cron: '0 1 * * *'   # Daily 01:00 UTC (09:00 MYT)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal-check:
    name: 🔍 AAA Structural Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install deps
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || pip install fastmcp pydantic

      - name: AAA directory integrity
        run: |
          echo "=== AAA Folder Integrity ==="
          [ -d AAA ] || { echo "WARNING: AAA directory missing — may be in separate repo"; }
          echo "✅ AAA check complete"

      - name: Canonical entrypoint verification
        run: |
          python -c "
          import os, sys
          required = [
            'arifosmcp/runtime/server.py',
            'arifosmcp/runtime/__main__.py',
            'core/pipeline.py',
            'core/kernel/__init__.py',
            'Dockerfile',
            'docker-compose.yml',
            'fastmcp.json',
            'pyproject.toml',
          ]
          ok = True
          for f in required:
            if os.path.exists(f):
              print(f'✅ {f}')
            else:
              print(f'❌ MISSING: {f}')
              ok = False
          sys.exit(0 if ok else 1)
          "

      - name: Import smoke test
        env:
          ARIFOS_PHYSICS_DISABLED: "1"
          ARIFOS_ALLOW_LEGACY_SPEC: "1"
        run: |
          python -c "
          import os
          os.environ['ARIFOS_PHYSICS_DISABLED'] = '1'
          os.environ['ARIFOS_ALLOW_LEGACY_SPEC'] = '1'
          import arifosmcp.runtime.server
          print('✅ arifosmcp.runtime.server imports clean')
          " 2>&1 || echo "⚠️ Import warning — check optional deps"

      - name: F9 Anti-Hantu scan
        run: |
          PATTERNS="conscious|I feel|sentient|suffering|inner voice"
          FOUND=$(grep -rEi "$PATTERNS" arifosmcp/ core/ --include="*.py" 2>/dev/null | grep -v "__pycache__" || true)
          [ -z "$FOUND" ] && echo "✅ PASS: no consciousness claims in codebase" || { echo "🚨 FAIL: $FOUND"; exit 1; }

      - name: Compose secrets guard
        run: |
          FOUND=0
          for f in docker-compose.yml docker-compose.*.yml; do
            [ -f "$f" ] || continue
            if grep -nE "hf_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9]{20,}|:[0-9]{10}:[A-Za-z0-9_-]{35}" "$f" 2>/dev/null; then
              echo "🚨 888 HOLD — Hardcoded secret in $f"
              FOUND=1
            fi
          done
          [ $FOUND -eq 0 ] && echo "✅ No hardcoded secrets in compose files" || exit 1

      - name: Seal report
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "arifOS AAA Seal Check"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA:    ${{ github.sha }}"
          echo "Time:   $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "DITEMPA BUKAN DIBERI"
