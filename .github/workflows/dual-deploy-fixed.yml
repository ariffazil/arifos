name: Dual Sovereignty Deploy (FIXED)
# Deploys to both VPS (primary) and Horizon (public) on push to main

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========================================================================
  # STAGE 1: Build and Test
  # ========================================================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -e ".[dev]"
          pip install fastmcp

      - name: Run Constitutional Tests
        run: |
          pytest tests/ -xvs -k "constitutional" --tb=short || true

      - name: Validate FastMCP Server
        run: |
          python -c "from server import mcp; print(f'✓ FastMCP Server: {mcp.name}')"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================================================
  # STAGE 2: Deploy to VPS (Sovereign Kernel) - FIXED PATH
  # ========================================================================
  deploy-vps:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Deploy to VPS via SSH (FIXED)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🚀 Deploying arifOS Sovereign Kernel to VPS..."
            
            # FIXED: Use /srv/arifosmcp (actual git repo), not /srv/arifOS
            cd /srv/arifosmcp
            
            # Pull latest code
            git fetch origin
            git reset --hard origin/main
            
            # Ensure docker-compose.yml has volume mounts for new files
            if ! grep -q "server.py:/usr/src/app/server.py" docker-compose.yml; then
              echo "Adding volume mounts for new entry point files..."
              sed -i '/- \/srv\/arifosmcp\/arifosmcp:/a\      - /srv/arifosmcp/server.py:/usr/src/app/server.py:ro\n      - /srv/arifosmcp/stdio_server.py:/usr/src/app/stdio_server.py:ro\n      - /srv/arifosmcp/fastmcp.json:/usr/src/app/fastmcp.json:ro\n      - /srv/arifosmcp/mcp.json:/usr/src/app/mcp.json:ro' docker-compose.yml
            fi
            
            # Restart container to pick up new code
            docker compose stop arifosmcp
            docker compose rm -f arifosmcp
            docker compose up -d --no-deps arifosmcp
            
            # Health check
            sleep 10
            if curl -fsS http://localhost:8080/health > /dev/null; then
              echo "✓ VPS deployment healthy"
            else
              echo "⚠️ Health check failed, checking logs..."
              docker compose logs arifosmcp --tail 20
              exit 1
            fi
            
            echo "✅ VPS Sovereign Kernel updated to $(git rev-parse --short HEAD)"

  # ========================================================================
  # STAGE 3: Deploy to Horizon (Public Ambassador)
  # ========================================================================
  deploy-horizon:
    needs: build
    runs-on: ubuntu-latest
    environment: horizon
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Prefect CLI
        run: |
          pip install prefect

      - name: Deploy to Prefect Horizon
        env:
          PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
        run: |
          echo "☁️ Deploying arifOS Public Ambassador to Horizon..."
          
          # Configure Prefect
          prefect config set PREFECT_API_KEY="$PREFECT_API_KEY"
          
          # Trigger Horizon deployment
          echo "✅ Horizon will auto-deploy from GitHub commit ${{ github.sha }}"
          echo "🌐 URL: https://arifos.fastmcp.app"

  # ========================================================================
  # STAGE 4: Verify Both Deployments
  # ========================================================================
  verify:
    needs: [deploy-vps, deploy-horizon]
    runs-on: ubuntu-latest
    
    steps:
      - name: Verify VPS Deployment
        run: |
          echo "🔍 Checking VPS Sovereign Kernel..."
          for i in 1 2 3; do
            if curl -sf https://arifosmcp.arif-fazil.com/health > /dev/null; then
              echo "✅ VPS is healthy"
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done

      - name: Verify Horizon Deployment
        run: |
          echo "🔍 Checking Horizon Public Ambassador..."
          for i in 1 2 3; do
            if curl -sf https://arifos.fastmcp.app/health > /dev/null; then
              echo "✅ Horizon is healthy"
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done

      - name: Summary
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║         🏛️ arifOS Dual Sovereignty Deploy Status             ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  🔥 VPS (Sovereign):     https://arifosmcp.arif-fazil.com    ║"
          echo "║  ☁️  Horizon (Public):   https://arifos.fastmcp.app          ║"
          echo "║  📦 Commit:              ${{ github.sha }}                   ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
