# Reusable Secrets Gate — F11 Authority
# Called by all federation repos via:
#   uses: ariffazil/arifos/.github/workflows/_shared-secrets-gate.yml@main
# Caller may pass secrets.GITHUB_TOKEN, but the reusable gate also falls back to
# the workflow's default github.token so federation callers do not fail before
# any jobs start.

name: 🔐 Shared Secrets Gate (F11)

on:
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  gitleaks:
    name: F11 — Gitleaks Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
        continue-on-error: false

      - name: Custom pattern guard (HF, Telegram, AWS, GitHub tokens)
        run: |
          echo "🔍 F11 Custom Secrets Scan..."
          FAILED=0

          if git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs -r grep -lnE "hf_[A-Za-z0-9]{20,}" 2>/dev/null; then
            echo "🚨 888 HOLD — HF_TOKEN found"
            FAILED=1
          fi

          if git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs -r grep -lnE "[0-9]{9,10}:AA[A-Za-z0-9_-]{33}" 2>/dev/null; then
            echo "🚨 888 HOLD — Telegram bot token found"
            FAILED=1
          fi

          if git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs -r grep -lnE "AKIA[0-9A-Z]{16}" 2>/dev/null; then
            echo "🚨 888 HOLD — AWS key found"
            FAILED=1
          fi

          if git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs -r grep -lnE "ghp_[a-zA-Z0-9]{36}" 2>/dev/null; then
            echo "🚨 888 HOLD — GitHub PAT found"
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then exit 1; fi
          echo "Custom scan: CLEAN"
