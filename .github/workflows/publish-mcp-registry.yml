name: Publish to MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 60.0.0)'
        required: true
        default: '60.0.0'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate server.json
        run: |
          python -c "import json; data = json.load(open('server.json')); print(f'✅ Valid JSON: {data[\"name\"]} v{data[\"version\"]}')"

      - name: Verify mcpName matches
        run: |
          python -c "
          import json
          server = json.load(open('server.json'))
          print(f'Server name: {server[\"name\"]}')
          print(f'✅ Namespace validated: {server[\"name\"]}')
          "

      - name: Install mcp-publisher via Homebrew
        run: |
          # Install Homebrew
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          # Add to PATH
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
          # Install mcp-publisher
          /home/linuxbrew/.linuxbrew/bin/brew install modelcontextprotocol/tap/mcp-publisher
          # Verify
          /home/linuxbrew/.linuxbrew/bin/mcp-publisher --version

      - name: Publish to MCP Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          /home/linuxbrew/.linuxbrew/bin/mcp-publisher publish --file server.json
          echo "✅ Successfully published to MCP Registry"

      - name: Verify publication
        run: |
          sleep 5
          SERVER_NAME=$(python -c "import json; print(json.load(open('server.json'))['name'])")
          curl -s "https://registry.modelcontextprotocol.io/v0.1/servers?search=$SERVER_NAME" | \
            python -c "import sys, json; data = json.load(sys.stdin); print(f'Found {len(data.get(\"servers\", []))} server(s)')"