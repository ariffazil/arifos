name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — pull + build only, skip restart and health check"
        type: boolean
        default: true


permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: false
jobs:
  deploy:
    name: SSH Deploy → af-forge VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 72.62.71.199
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            # Work from the arifOS source repo — always up to date after push
            cd /root/arifOS
            git fetch origin main
            git reset --hard "${{ github.sha }}"

            # Derive build metadata from VPS git — reliable, no env var dependency
            LOCAL_SHA=$(git rev-parse HEAD)
            LOCAL_SHORT=$(git rev-parse --short HEAD)
            LOCAL_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "main")
            LOCAL_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)

            echo "[DEPLOY] Building arifOS from ${LOCAL_SHORT} (${LOCAL_BRANCH}) at ${LOCAL_TIME}..."

            docker build \
              --build-arg ARIFOS_BUILD_SHA="${LOCAL_SHA}" \
              --build-arg ARIFOS_BUILD_BRANCH="${LOCAL_BRANCH}" \
              --build-arg ARIFOS_BUILD_TIME="${LOCAL_TIME}" \
              -t "ghcr.io/ariffazil/arifos:${LOCAL_SHORT}" \
              -t "ghcr.io/ariffazil/arifos:latest" \
              -f arifosmcp/Dockerfile .

            echo "[DEPLOY] Pushing to GHCR..."
            docker push ghcr.io/ariffazil/arifos:"${LOCAL_SHORT}" &
            docker push ghcr.io/ariffazil/arifos:latest &
            wait
            echo "[DEPLOY] GHCR push complete — ghcr.io/ariffazil/arifos:${LOCAL_SHORT}"

            echo "[DEPLOY] Updating docker-compose.yml with new image tag..."
            # Note: /root/compose is local-only — do not git reset there.
            # Match any existing tag (hex sha, date-based, semantic) and replace.
            sed -i -E "s|ghcr\.io/ariffazil/arifos:[a-zA-Z0-9._-]+|ghcr.io/ariffazil/arifos:${LOCAL_SHORT}|g" /root/compose/docker-compose.yml
            grep "arifosmcp:" -A 2 /root/compose/docker-compose.yml | grep image

            echo "[DEPLOY] Restarting Docker Compose arifosmcp service..."
            if [ "${{ github.event.inputs.dry_run }}" = "true" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "[DRY RUN] Skipping restart and health check — dry_run=true"
              echo "[DRY RUN] Would have run: docker compose up -d --no-deps --force-recreate arifosmcp"
              exit 0
            fi
            cd /root/compose
            DEPLOY_GIT_COMMIT="${LOCAL_SHA}" docker compose up -d --no-deps --force-recreate arifosmcp
            sleep 8

            echo "[DEPLOY] Verifying server health..."
            HEALTH=$(curl -fsS http://localhost:8088/health)
            echo "${HEALTH}" | python3 -m json.tool
            echo "${HEALTH}" | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            assert d['status'] in ('healthy', 'degraded'), f'Server unhealthy: {d}'
            ver = d.get('version', '?')
            tools = d.get('tools_loaded', '?')
            print(f'✓ status={d[\"status\"]} tools={tools} version={ver}')
            "
            echo "[DEPLOY] SEAL COMPLETE — DITEMPA BUKAN DIBERI"
