name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — pull + build only, skip restart and health check"
        type: boolean
        default: true


permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: false
jobs:
  deploy:
    name: SSH Deploy → af-forge VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 72.62.71.199
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /root/arifOS
            git fetch origin main
            if [ "${{ github.event.inputs.dry_run }}" = "true" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "[DRY RUN] Verifying target SHA and deploy prerequisites only"
              git rev-parse "${{ github.sha }}"
              exit 0
            fi

            git checkout --force "${{ github.sha }}"
            echo "[DEPLOY] Syncing current HEAD into /opt/arifos/app via make deploy-local..."
            make deploy-local

            echo "[DEPLOY] Verifying server health..."
            HEALTH=$(curl -fsS http://localhost:8088/health)
            echo "${HEALTH}" | python3 -m json.tool
            echo "${HEALTH}" | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            assert d['status'] in ('healthy', 'degraded'), f'Server unhealthy: {d}'
            ver = d.get('version', '?')
            tools = d.get('tools_loaded', '?')
            print(f'✓ status={d[\"status\"]} tools={tools} version={ver}')
            "
            DEPLOYED_SHA=$(tr -d '[:space:]' < /opt/arifos/app/.git_commit 2>/dev/null || true)
            echo "[DEPLOY] Runtime .git_commit=${DEPLOYED_SHA}"
            test "${DEPLOYED_SHA}" = "$(git rev-parse --short=7 HEAD)"
            echo "[DEPLOY] SEAL COMPLETE — DITEMPA BUKAN DIBERI"
