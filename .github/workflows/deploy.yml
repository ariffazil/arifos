name: Deploy to VPS

on:
  push:
    branches:
      - main

env:
  GIT_SHA: ${{ github.sha }}
  GIT_BRANCH: ${{ github.ref_name }}
  BUILD_TIME: ${{ github.event.created_at || github.event.head_commit?.timestamp || now() }}

jobs:
  deploy:
    name: SSH Deploy → af-forge VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 72.62.71.199
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs:
            - GIT_SHA
            - GIT_BRANCH
            - BUILD_TIME
          script: |
            set -euo pipefail
            # Note: /root/compose is local-only (github.com/ariffazil/compose does not exist).
            # docker-compose.yml is edited in place. DO NOT git reset — it would overwrite the image tag.
            echo "[DEPLOY] Building arifOS image ${GIT_SHA}..."
            docker build \
              --build-arg ARIFOS_BUILD_SHA="${GIT_SHA}" \
              --build-arg ARIFOS_BUILD_BRANCH="${GIT_BRANCH}" \
              --build-arg ARIFOS_BUILD_TIME="${BUILD_TIME}" \
              -t "ghcr.io/ariffazil/arifos:${GIT_SHA}" \
              -t "ghcr.io/ariffazil/arifos:latest" \
              -f arifOS/arifosmcp/Dockerfile . || \
            docker build \
              --build-arg ARIFOS_BUILD_SHA="${GIT_SHA}" \
              --build-arg ARIFOS_BUILD_BRANCH="${GIT_BRANCH}" \
              --build-arg ARIFOS_BUILD_TIME="${BUILD_TIME}" \
              -t "ghcr.io/ariffazil/arifos:${GIT_SHA}" \
              -t "ghcr.io/ariffazil/arifos:latest" \
              -f arifosmcp/Dockerfile .
            echo "[DEPLOY] Pushing to GHCR..."
            docker push ghcr.io/ariffazil/arifos:"${GIT_SHA}" &
            docker push ghcr.io/ariffazil/arifos:latest &
            wait
            echo "[DEPLOY] GHCR push complete — image available at ghcr.io/ariffazil/arifos:${GIT_SHA}"
            echo "[DEPLOY] Updating docker-compose.yml with new image tag..."
            sed -i "s|ghcr.io/ariffazil/arifos:[a-f0-9]*|ghcr.io/ariffazil/arifos:${GIT_SHA}|g" /root/compose/docker-compose.yml
            grep "arifosmcp:" -A 2 /root/compose/docker-compose.yml | grep image
            echo "[DEPLOY] Restarting Docker Compose arifosmcp service..."
            cd /root/compose
            DEPLOY_GIT_COMMIT="${GIT_SHA}" docker compose up -d --no-deps --force-recreate arifosmcp
            sleep 8
            echo "[DEPLOY] Verifying server health..."
            HEALTH=$(curl -fsS http://localhost:8080/health)
            echo "${HEALTH}" | python -m json.tool
            echo "${HEALTH}" | python -c "import sys,json; d=json.load(sys.stdin); assert d['status'] in ('healthy','degraded'), f'Server unhealthy: {d}'; print(f'✓ status={d[\"status\"]} tools={d.get(\"tools_loaded\")}')"
            echo "[DEPLOY] SEAL COMPLETE — DITEMPA BUKAN DIBERI"
