name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy → af-forge VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.71.199
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "[DEPLOY] Pulling latest main..."
            cd /root/arifOS
            git fetch origin main
            git reset --hard origin/main
            echo "[DEPLOY] Restarting arifOS server..."
            pkill -f "uvicorn|fastmcp|server.py" || true
            sleep 2
            nohup python server.py > /tmp/arifos_server.log 2>&1 &
            sleep 3
            echo "[DEPLOY] Verifying server health..."
            curl -sf http://localhost:8000/health || echo "WARNING: health check failed"
            echo "[DEPLOY] SEAL COMPLETE — DITEMPA BUKAN DIBERI"
