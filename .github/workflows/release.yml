name: 🔱 Sovereign Release Pipeline
on:
  push:
    tags:
      - 'v20[0-9][0-9].*'  # Match sovereign date tags

jobs:
  audit-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python + uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: 13-Floor Constitutional Audit
        run: |
          uv run pytest tests/ -v --tb=short
          echo "✅ F1-F13 floors cleared"

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv build
          uv publish

      - name: Build + Push GHCR Image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u ariffazil --password-stdin
          docker build -t ghcr.io/ariffazil/arifos:${{ github.ref_name }} .
          docker push ghcr.io/ariffazil/arifos:${{ github.ref_name }}

      - name: Publish to NPM (@arifos/elements)
        if: contains(github.ref_name, 'elements') || contains(github.event.head_commit.message, 'feat: elements')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -d "arif-sites" ]; then
            cd arif-sites
            npm publish --access public
          fi

      - name: Sync Living Law (Sovereign Anchor)
        env:
          GITHUB_TOKEN: ${{ secrets.LAW_GIST_TOKEN }}
          GIST_ID: 81314f6cda1ea898f9feb88ce8f8959b
        run: |
          echo "Sealing Sovereign Version ${{ github.ref_name }} to Gist $GIST_ID"
          curl -X PATCH \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"files\": {
                \"000_CONSTITUTION.md\": {\"content\": $(jq -Rs . < 000/000_CONSTITUTION.md)},
                \"000_DOCTRINE.md\": {\"content\": $(jq -Rs . < 000/000_DOCTRINE.md)}
              }
            }" \
            https://api.github.com/gists/$GIST_ID

      - name: 999 SEAL
        run: |
          echo '{"epoch":"'$(date -u +%Y.%m.%dT%H:%M:%SZ)'","tag":"'${{ github.ref_name }}'","verdict":"SEALED","surfaces":["pypi","npm","ghcr","gist"],"ditempa":"BUKAN_DIBERI"}' > release_seal.json
          cat release_seal.json
