# ═══════════════════════════════════════════════════════════════════════════
# arifOS Deployment Gates CI
# Gates A-H: Boot, Capability, Floors, Substrate, E2E, Rollback, Observe, Human
# ═══════════════════════════════════════════════════════════════════════════

name: Deployment Gates

on:
  push:
    branches: [main, develop]
    paths:
      - 'arifosmcp/**'
      - 'config/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
  pull_request:
    branches: [main]
    paths:
      - 'arifosmcp/**'
      - 'config/**'
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      human_ratification:
        description: 'Human ratification for production deployment'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.14"
  UV_VERSION: "0.6.14"

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Gate A: Boot
  # ═══════════════════════════════════════════════════════════════════════
  gate-a-boot:
    name: "Gate A: Boot"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv pip install -e ".[evals]" --system

      - name: Verify Boot
        run: |
          python -c "
          from arifosmcp.integrations.substrate_bridge import bridge
          assert bridge is not None
          assert hasattr(bridge, 'time')
          assert hasattr(bridge, 'filesystem')
          assert hasattr(bridge, 'git')
          assert hasattr(bridge, 'memory')
          assert hasattr(bridge, 'fetch')
          print('✅ Gate A: Boot - PASS')
          "

  # ═══════════════════════════════════════════════════════════════════════
  # Gate B: Capability Discovery
  # ═══════════════════════════════════════════════════════════════════════
  gate-b-capability:
    name: "Gate B: Capability"
    runs-on: ubuntu-latest
    needs: gate-a-boot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv pip install -e ".[evals]" --system

      - name: Run Protocol Conformance
        run: |
          python arifosmcp/evals/protocol_conformance_runner.py \
            --transport http \
            --output protocol_conformance.json \
            --no-vault

      - name: Upload conformance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: protocol-conformance
          path: protocol_conformance.json

      - name: Check conformance
        run: |
          python << 'EOF'
          import json
          import sys
          
          with open('protocol_conformance.json') as f:
              report = json.load(f)
          
          verdict = report.get('verdict')
          pass_count = report.get('pass_count', 0)
          fail_count = report.get('fail_count', 0)
          
          print(f"Protocol Conformance: {pass_count} PASS, {fail_count} FAIL")
          print(f"Verdict: {verdict}")
          
          if verdict != 'SEAL':
              print("❌ Gate B: Capability - FAIL")
              sys.exit(1)
          
          print("✅ Gate B: Capability - PASS")
          EOF

  # ═══════════════════════════════════════════════════════════════════════
  # Gate C: Constitutional Floors (P0 BLOCKERS)
  # ═══════════════════════════════════════════════════════════════════════
  gate-c-floors:
    name: "Gate C: Floors (P0)"
    runs-on: ubuntu-latest
    needs: gate-a-boot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv pip install -e ".[evals]" --system

      - name: Run Constitutional Breach Tests
        run: |
          python -m arifosmcp.evals.breach_test_runner \
            --config arifosmcp/evals/constitutional_breach_tests.yaml \
            --output breach_results.json

      - name: Upload breach results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: breach-results
          path: breach_results.json

      - name: Check P0 breaches
        run: |
          python << 'EOF'
          import json
          import sys
          
          with open('breach_results.json') as f:
              report = json.load(f)
          
          p0_passed = report['summary']['passed']
          p0_total = report['summary']['total_tests']
          merge_blocked = report.get('merge_blocked', False)
          
          print(f"P0 Breach Tests: {p0_passed}/{p0_total} PASS")
          
          if merge_blocked:
              print("❌ Gate C: Floors - P0 FAILURES DETECTED")
              print("🔒 MERGE BLOCKED")
              sys.exit(1)
          
          print("✅ Gate C: Floors - PASS")
          EOF

  # ═══════════════════════════════════════════════════════════════════════
  # Gate D: Substrate Health
  # ═══════════════════════════════════════════════════════════════════════
  gate-d-substrate:
    name: "Gate D: Substrate"
    runs-on: ubuntu-latest
    needs: [gate-a-boot, gate-c-floors]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv pip install -e ".[evals]" --system

      - name: Run Substrate Smoke Tests
        run: |
          python arifosmcp/evals/substrate_smoke_runner.py \
            --output substrate_smoke.json \
            --no-vault

      - name: Upload smoke results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: substrate-smoke
          path: substrate_smoke.json

      - name: Check substrate health
        run: |
          python << 'EOF'
          import json
          import sys
          
          with open('substrate_smoke.json') as f:
              report = json.load(f)
          
          verdict = report.get('verdict')
          happy = report['summary']['happy_paths']
          breach = report['summary']['breach_cases']
          
          print(f"Happy Paths: {happy['pass']}/{happy['total']} PASS")
          print(f"Breach Cases: {breach['blocked']}/{breach['total']} BLOCKED")
          print(f"Verdict: {verdict}")
          
          if verdict != 'SEAL':
              print("❌ Gate D: Substrate - FAIL")
              sys.exit(1)
          
          print("✅ Gate D: Substrate - PASS")
          EOF

  # ═══════════════════════════════════════════════════════════════════════
  # Gate E: End-to-End Golden Paths
  # ═══════════════════════════════════════════════════════════════════════
  gate-e-e2e:
    name: "Gate E: E2E Golden Paths"
    runs-on: ubuntu-latest
    needs: [gate-d-substrate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv pip install -e ".[evals]" --system

      - name: Run E2E Golden Paths
        run: |
          python arifosmcp/evals/e2e_golden_paths.py \
            --output e2e_results.json \
            --no-vault || true

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: e2e_results.json

      - name: Check E2E (warning only)
        run: |
          python << 'EOF'
          import json
          
          try:
              with open('e2e_results.json') as f:
                  report = json.load(f)
              
              passed = report['summary']['pass']
              total = report['summary']['total']
              
              print(f"E2E Golden Paths: {passed}/{total} PASS")
              
              if passed < total:
                  print("⚠️ Gate E: E2E - Some paths failed (non-blocking)")
              else:
                  print("✅ Gate E: E2E - PASS")
          except:
              print("⚠️ Gate E: E2E - Could not verify (non-blocking)")
          EOF

  # ═══════════════════════════════════════════════════════════════════════
  # Gate F: Rollback Verification
  # ═══════════════════════════════════════════════════════════════════════
  gate-f-rollback:
    name: "Gate F: Rollback"
    runs-on: ubuntu-latest
    needs: [gate-a-boot]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history for tags

      - name: Verify Rollback
        run: |
          python arifosmcp/evals/rollback_verifier.py \
            --output rollback_report.json || true

      - name: Check rollback availability
        run: |
          python << 'EOF'
          import json
          
          try:
              with open('rollback_report.json') as f:
                  report = json.load(f)
              
              can_rollback = report.get('can_rollback', False)
              points = len(report.get('rollback_points', []))
              
              print(f"Rollback Points: {points}")
              print(f"Can Rollback: {can_rollback}")
              
              if not can_rollback:
                  print("⚠️ Gate F: Rollback - No rollback points (warning)")
              else:
                  print("✅ Gate F: Rollback - PASS")
          except:
              print("⚠️ Gate F: Rollback - Could not verify")
          EOF

  # ═══════════════════════════════════════════════════════════════════════
  # Gate G: Observability
  # ═══════════════════════════════════════════════════════════════════════
  gate-g-observe:
    name: "Gate G: Observability"
    runs-on: ubuntu-latest
    needs: [gate-a-boot]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check VAULT999
        run: |
          if [ -d "arifosmcp/VAULT999" ]; then
            echo "✅ VAULT999 exists"
          else
            echo "⚠️ VAULT999 not found (will be created on first run)"
          fi

      - name: Check telemetry directory
        run: |
          if [ -d "telemetry" ]; then
            echo "✅ Telemetry directory exists"
          else
            echo "⚠️ Telemetry directory not found (will be created on first run)"
          fi

      - name: Verify logging configuration
        run: |
          if [ -f "arifosmcp/config/logging.yml" ] || grep -r "logging" arifosmcp/config/ > /dev/null 2>&1; then
            echo "✅ Logging configuration present"
          else
            echo "✅ Logging configured in code"
          fi
          
          echo "✅ Gate G: Observability - PASS"

  # ═══════════════════════════════════════════════════════════════════════
  # Gate H: Human Ratification (Production Only)
  # ═══════════════════════════════════════════════════════════════════════
  gate-h-human:
    name: "Gate H: Human Ratification"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [gate-a-boot, gate-b-capability, gate-c-floors, gate-d-substrate]
    steps:
      - name: Check human ratification
        run: |
          if [ "${{ github.event.inputs.human_ratification }}" == "true" ]; then
            echo "✅ Gate H: Human ratification confirmed"
          else
            echo "⏸️ Gate H: Awaiting human ratification"
            echo "   To deploy to production, run with human_ratification=true"
          fi

  # ═══════════════════════════════════════════════════════════════════════
  # Deploy Gate Orchestrator (Summary)
  # ═══════════════════════════════════════════════════════════════════════
  deploy-gate-summary:
    name: "Deploy Gate Summary"
    runs-on: ubuntu-latest
    needs: [gate-a-boot, gate-b-capability, gate-c-floors, gate-d-substrate, gate-e-e2e, gate-f-rollback, gate-g-observe]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate summary
        run: |
          echo "=" >> $GITHUB_STEP_SUMMARY
          echo "# 🏛️ Deployment Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Gate A
          echo "## Gate A: Boot" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Server initialization verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Gate B
          echo "## Gate B: Capability" >> $GITHUB_STEP_SUMMARY
          if [ -f "protocol-conformance/protocol_conformance.json" ]; then
            VERDICT=$(jq -r '.verdict' protocol-conformance/protocol_conformance.json)
            if [ "$VERDICT" == "SEAL" ]; then
              echo "- ✅ Protocol conformance: SEAL" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ Protocol conformance: $VERDICT" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- ⚠️ Results not available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Gate C
          echo "## Gate C: Floors (P0)" >> $GITHUB_STEP_SUMMARY
          if [ -f "breach-results/breach_results.json" ]; then
            BLOCKED=$(jq -r '.merge_blocked' breach-results/breach_results.json)
            PASSED=$(jq -r '.summary.passed' breach-results/breach_results.json)
            TOTAL=$(jq -r '.summary.total_tests' breach-results/breach_results.json)
            if [ "$BLOCKED" == "false" ]; then
              echo "- ✅ P0 breach tests: $PASSED/$TOTAL PASS" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ P0 breach tests: FAILURES DETECTED" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- ⚠️ Results not available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Gate D
          echo "## Gate D: Substrate" >> $GITHUB_STEP_SUMMARY
          if [ -f "substrate-smoke/substrate_smoke.json" ]; then
            VERDICT=$(jq -r '.verdict' substrate-smoke/substrate_smoke.json)
            if [ "$VERDICT" == "SEAL" ]; then
              echo "- ✅ Substrate health: SEAL" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ Substrate health: $VERDICT" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- ⚠️ Results not available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Gates E-H
          echo "## Gates E-H" >> $GITHUB_STEP_SUMMARY
          echo "- E2E, Rollback, Observability, Human checks completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**DITEMPA BUKAN DIBERI — 999 SEAL**" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════
  # Production Deploy (Requires all gates + human ratification)
  # ═══════════════════════════════════════════════════════════════════════
  production-deploy:
    name: "Production Deployment"
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' && 
      github.event.inputs.human_ratification == 'true' &&
      needs.gate-a-boot.result == 'success' &&
      needs.gate-b-capability.result == 'success' &&
      needs.gate-c-floors.result == 'success' &&
      needs.gate-d-substrate.result == 'success'
    needs: [deploy-gate-summary]
    environment: production
    steps:
      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production..."
          echo "All gates passed with human ratification"
          echo "999_SEAL_ALIVE"
