[project]
name = "arifos"
version = "2026.04.24"
description = "arifOS v2.0 — Constitutional AGI Operating System"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "AGPL-3.0"}
authors = [
    {name = "Arif Fazil", email = "arif@arif-fazil.com"}
]

dependencies = [
    "fastmcp==3.2.4",
    "prefab-ui==0.18.2",
    "pydantic==2.13.3",
    "anyio==4.13.0",
    "starlette==1.0.0",
    "itsdangerous>=2.0.0",
    "openapi-pydantic==0.5.1",
    "fastapi==0.136.1",
    "uvicorn[standard]==0.46.0",
    "sse-starlette==3.3.4",
    "mcp==1.27.0",
    "httpx==0.28.1",
    "prometheus-client>=0.19.0",
    "rich==15.0.0",
    "asyncpg==0.31.0",
    "qdrant-client==1.17.1",
    "ddgs>=9.5.4",
    "beautifulsoup4>=4.12.0",
    "requests>=2.31.0",
    "redis==7.4.0",
    "cryptography==46.0.7",
    "psutil==7.2.2",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0.0",
    "python-lsp-server>=1.11.0",
    "py-key-value-aio[redis]>=0.4.0",
    "psycopg2-binary>=2.9.0",
    "aiofiles>=23.2.1",
    "blake3==1.0.8",
    "supabase==2.25.1",
]

[project.urls]
Homepage = "https://arif-fazil.com"
Repository = "https://github.com/ariffazil/arifos"
Documentation = "https://arifos.arif-fazil.com"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["arifos*", "arifosmcp*"]

[tool.uv]
managed = true
package = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
