# Prefect Deployment Configuration for arifOS MCP Server
# https://horizon.prefect.io/arifos/servers/arifOS

name: arifos-mcp

# Build configuration
build:
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.6.0
      image_name: arifos/arifosmcp
      tag: "2026.03.25"
      dockerfile: Dockerfile
      platform: linux/amd64

# Push configuration
push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.6.0
      image_name: "{{ build-image.image_name }}"
      tag: "{{ build-image.tag }}"

# Deployment configuration
deployments:
  - name: arifos-mcp-server
    version: "2026.03.25"
    description: "Constitutional AI Governance MCP Server - 11 Mega-Tools with F1-F13 Floors"
    tags:
      - mcp
      - governance
      - constitutional-ai
    schedule: null  # Manual trigger only
    
    # Entry point
    entrypoint: arifosmcp/integrations/prefect/tasks.py:constitutional_flow
    
    # Work pool
    work_pool:
      name: arifos-pool
      work_queue_name: default
      
    # Infrastructure (managed by Prefect)
    infrastructure:
      type: docker
      env:
        # Required env vars (must be set in Horizon UI)
        ARIF_JWT_SECRET: "{{ $ARIF_JWT_SECRET }}"
        DATABASE_URL: "{{ $DATABASE_URL }}"
        REDIS_URL: "{{ $REDIS_URL }}"
        HOST: "{{ $HOST }}"
        PORT: "{{ $PORT }}"
        
        # Optional LLM keys
        OPENAI_API_KEY: "{{ $OPENAI_API_KEY }}"
        ANTHROPIC_API_KEY: "{{ $ANTHROPIC_API_KEY }}"
        GEMINI_API_KEY: "{{ $GEMINI_API_KEY }}"
        PPLX_API_KEY: "{{ $PPLX_API_KEY }}"
        BRAVE_API_KEY: "{{ $BRAVE_API_KEY }}"
        
        # Runtime config
        AAA_MCP_TRANSPORT: http
        ARIFOS_VERSION: "2026.03.25"
        ARIFOS_PUBLIC_TOOL_PROFILE: public
        
    # Concurrency limits
    concurrency_limit: 10
    
    # Job variables
    job_variables:
      image: "{{ build-image.image }}"
      
    # Enforcement
    enforce_parameter_schema: true
