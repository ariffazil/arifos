server {
    listen 80;
    server_name arif-fazil.com;
    location / {
        root /usr/share/nginx/html/arif;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        if_modified_since off;
        expires off;
        etag off;
    }
}

