server {
    listen 80;
    server_name geox.arif-fazil.com;
    root /usr/share/nginx/html/geox;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to geox_eic container
    location /health {
        proxy_pass http://geox_eic:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # API Tools proxy (if needed, otherwise static files take precedence)
    location /api/tools {
        proxy_pass http://geox_eic:8000/tools;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    location /mcp {
        proxy_pass http://geox_eic:8000/mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name arifos.arif-fazil.com arifOS.arif-fazil.com;
    # RETIRED — redirect to aaa.arif-fazil.com (AAA Wire = protocol discovery)
    location / {
        return 301 https://aaa.arif-fazil.com$request_uri;
    }
}

# arif.arif-fazil.com — redirect to main hub (arif-fazil.com)
server {
    listen 80;
    server_name arif.arif-fazil.com;
    location / {
        return 301 https://arif-fazil.com$request_uri;
    }
}

server {
    listen 80;
    server_name arifosmcp.arif-fazil.com;
    root /usr/share/nginx/html/arifosmcp;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Proxy API calls to arifosmcp container
    location /health {
        proxy_pass http://arifosmcp_server:8080/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /tools {
        proxy_pass http://arifosmcp_server:8080/tools;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /mcp {
        proxy_pass http://arifosmcp_server:8080/mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /sse {
        proxy_pass http://arifosmcp_server:8089/sse;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-cache";
        add_header X-Accel-Buffering "no";
    }

    # ── New REST routes (arifOS AAA MCP) ────────────────────────────────────────
    # ^~ stops prefix matching — these take priority over `location /`
    location ^~ /resources {
        proxy_pass http://arifosmcp_server:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /prompts {
        proxy_pass http://arifosmcp_server:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /a2a {
        proxy_pass http://arifosmcp_server:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /governance {
        proxy_pass http://arifosmcp_server:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /llms-full.txt {
        proxy_pass http://arifosmcp_server:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /discovery {
        proxy_pass http://arifosmcp_server:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /webmcp {
        proxy_pass http://arifosmcp_server:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/(\.well-known/mcp/server|\.well-known/agent|\.well-known/oauth-authorization-server|\.well-known/jwks)\.json$ {
        proxy_pass http://arifosmcp_server:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/\.well-known/webmcp$ {
        proxy_pass http://arifosmcp_server:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
