# geox-wealth/docker-compose.yml
# WELD-004 — Joins arifos_core_network, no new infra, no port conflicts
# DITEMPA BUKAN DIBERI

services:

  # ── VAULT999 Writer (ratified seal INSERT) ───────────────────────────
  vault999-writer:
    build:
      context: ../vault999_writer
      dockerfile: Dockerfile
    container_name: vault999-writer
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      VAULT999_DB: ${VAULT999_DB}
      VAULT_ADMIN_TOKEN: ${VAULT_ADMIN_TOKEN}
      PORT: "5001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - arifos_core_network
      - arifos_core

  # ── VAULT999 Unified Ledger (WELD-003) ──────────────────────────────
  vault-service:
    build:
      context: ../vault-service
      dockerfile: Dockerfile
    container_name: vault-service
    ports:
      - "127.0.0.1:8100:8100"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: "8100"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - arifos_core_network
      - arifos_core

  # ── GEOX Spatial Intelligence ──────────────────────────────────────
  geox:
    build:
      context: /root/GEOX
      dockerfile: Dockerfile
    container_name: geox
    ports:
      - "8000:8081"
    depends_on:
      vault-service:
        condition: service_started
    environment:
      ARIFOS_MCP_URL: http://arifosmcp:8080
      VAULT_URL: http://vault-service:8100
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - arifos_core_network

  # ── WEALTH Financial Intelligence ─────────────────────────────────
  wealth:
    build:
      context: /root/WEALTH
      dockerfile: Dockerfile
    container_name: wealth
    # WEALTH is stdio-only MCP — arifOS MCP kernel calls WEALTH as subprocess via stdio
    # Container stays alive via tail (no server running)
    entrypoint: ["tail"]
    command: ["-f", "/dev/null"]
    environment:
      ARIFOS_MCP_URL: http://arifosmcp:8080
      VAULT_URL: http://vault-service:8100
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    restart: unless-stopped
    networks:
      - arifos_core_network

  # ── VAULT999 Main Ledger ───────────────────────────────────────────
  # Note: This service was started manually and is not defined here.
  # It connects to both arifos_core_network and arifos_core for postgres.

networks:
  arifos_core_network:
    external: true
  arifos_core:
    external: true