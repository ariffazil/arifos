# WELD-004 Unified Docker Compose
# arifOS Federation — One `docker compose up` to run everything
# DITEMPA BUKAN DIBERI

services:

  # ── Constitutional Kernel ─────────────────────────────────────
  arifos-mcp:
    build:
      context: .
      dockerfile: arifosmcp/Dockerfile
    container_name: arifos-mcp
    ports: ["3000:3000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault-service:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://arifos:arifos@postgres:5432/arifos
      REDIS_URL: redis://redis:6379
      VAULT_URL: http://vault-service:8100
      ARIFOS_MCP_URL: http://arifos-mcp:3000
    networks:
      - arifos_federation
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── VAULT999 Shared Ledger ────────────────────────────────────
  vault-service:
    build:
      context: ./vault-service
      dockerfile: Dockerfile
    container_name: vault-service
    ports: ["8100:8100"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://arifos:arifos@postgres:5432/arifos
      PORT: "8100"
    networks:
      - arifos_federation
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── GEOX Spatial Intelligence ─────────────────────────────────
  geox:
    build:
      context: ./GEOX
      dockerfile: Dockerfile
    container_name: geox
    ports: ["8000:8000"]
    depends_on:
      arifos-mcp:
        condition: service_healthy
      vault-service:
        condition: service_healthy
    environment:
      ARIFOS_MCP_URL: http://arifos-mcp:3000
      VAULT_URL: http://vault-service:8100
      GEOX_SESSION_INIT_URL: http://arifos-mcp:3000/session/init
    networks:
      - arifos_federation
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── WEALTH Financial Intelligence ─────────────────────────────
  wealth:
    build:
      context: ./WEALTH
      dockerfile: Dockerfile
    container_name: wealth
    ports: ["8010:8010"]
    depends_on:
      arifos-mcp:
        condition: service_healthy
      vault-service:
        condition: service_healthy
    environment:
      ARIFOS_MCP_URL: http://arifos-mcp:3000
      VAULT_URL: http://vault-service:8100
    networks:
      - arifos_federation
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── A-FORGE TypeScript Bridge ─────────────────────────────────
  a-forge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: a-forge
    ports: ["4000:4000"]
    depends_on:
      arifos-mcp:
        condition: service_healthy
      geox:
        condition: service_healthy
      wealth:
        condition: service_healthy
      vault-service:
        condition: service_healthy
    environment:
      AF_FORGE_PORT: "4000"
      GEOX_MCP_URL: http://geox:8000
      WEALTH_MCP_URL: http://wealth:8010
      ARIFOS_MCP_URL: http://arifos-mcp:3000
      VAULT_URL: http://vault-service:8100
    networks:
      - arifos_federation
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Infrastructure ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: arifos
      POSTGRES_PASSWORD: arifos
      POSTGRES_DB: arifos
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - arifos_federation
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arifos"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - arifos_federation
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  arifos_federation:
    name: arifos_federation
    driver: bridge

volumes:
  pgdata: