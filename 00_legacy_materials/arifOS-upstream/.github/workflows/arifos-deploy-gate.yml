name: arifOS Deploy Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONUNBUFFERED: "1"
      ARIFOS_ENV: "ci"
      ARIFOS_EPOCH: "${{ github.run_id }}"
      ARIFOS_TRANSPORTS: "stdio,http"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then pip install -e .; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate compose
        run: docker compose config

      - name: Start substrate stack
        run: |
          docker compose up -d time filesystem git memory fetch everything || true
          docker compose ps

      - name: Wait for services
        run: python -m arifosmcp.evals.wait_for_stack

      - name: Run packs
        run: |
          python -m arifosmcp.evals.deploy_gate --pack boot
          python -m arifosmcp.evals.deploy_gate --pack mcp_contract
          python -m arifosmcp.evals.deploy_gate --pack constitutional_breach
          python -m arifosmcp.evals.deploy_gate --pack substrate_smoke
          python -m arifosmcp.evals.deploy_gate --pack native_mind
          python -m arifosmcp.evals.deploy_gate --pack e2e_paths
          python -m arifosmcp.evals.deploy_gate --pack observability
          python -m arifosmcp.evals.deploy_gate --pack rollback

      - name: Final deploy gate
        run: python -m arifosmcp.evals.deploy_gate --finalize --manifest arifosmcp/evals/deploy_gate.yaml

  production-approval:
    if: github.ref == 'refs/heads/main'
    needs: [test-and-gate]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Await human approval
        run: echo "Production environment approval required"

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [production-approval]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "Run production deployment here only after SEAL"
