# Nginx reverse proxy for arifOS MCP on A-FORGE
# ═══════════════════════════════════════════════════════════════════════════════
#
# Domain:  arifosmcp.arif-fazil.com  (consolidated — mcp.a-forge.io retired)
# Routes:  /mcp, /health, /ready, /build, /widget/vault-seal
#
# TLS: cert extracted from Traefik acme.json (arifosmcp.arif-fazil.com)
#      deployed to deployments/a-forge/ssl/
#      expires: 2026-06-03
#
# ROLLBACK:
#   Revert this file to previous server_name and run docker compose restart nginx

upstream arifos_mcp {
    server arifos-mcp:3000;
    keepalive 32;
}

# ─── HTTP server: challenge + redirect ────────────────────────────────────────
server {
    listen 80;
    server_name arifosmcp.arif-fazil.com;

    # Let's Encrypt ACME HTTP challenge (safe to automate)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # After certs are live, switch to redirect:
    return 301 https://$server_name$request_uri;

    # During initial setup (HTTP only), proxy directly:
    # include /etc/nginx/conf.d/proxy-common.conf;

    # Widget — served from nginx static volume
    location /widget/ {
        alias /var/www/arifos/widgets/;
        default_type text/html;
        include /etc/nginx/conf.d/widget-csp.conf;
        try_files $uri $uri/ =404;
    }

    location /widget/vault-seal {
        alias /var/www/arifos/widgets/vault-seal-widget.html;
        default_type text/html;
        include /etc/nginx/conf.d/widget-csp.conf;
    }
}

# ─── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name arifosmcp.arif-fazil.com;

    # TLS certificates (extracted from Traefik acme.json)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    include /etc/nginx/conf.d/proxy-common.conf;

    location /widget/ {
        alias /var/www/arifos/widgets/;
        default_type text/html;
        include /etc/nginx/conf.d/widget-csp.conf;
        try_files $uri $uri/ =404;
    }

    location /widget/vault-seal {
        alias /var/www/arifos/widgets/vault-seal-widget.html;
        default_type text/html;
        include /etc/nginx/conf.d/widget-csp.conf;
    }
}

