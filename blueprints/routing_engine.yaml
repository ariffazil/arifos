# ─────────────────────────────────────────────────────────────────
# SECTION 4: MULTI-SUBSTRATE / CONFLICT RULES
# ─────────────────────────────────────────────────────────────────

conflict_resolution:

  - scenario: "task mentions WEALTH + GEOX simultaneously"
    example: "value of this geology find"
    resolution: "Route GEOX first for evidence, then WEALTH for valuation"
    order: ["GEOX", "WEALTH"]
    reason: "Evidence before valuation — truth before fluency (L1)"

  - scenario: "task mentions WELL + any technical organ"
    example: "am i ready to review this NPV"
    resolution: "Route WELL first for readiness, then route to technical organ"
    order: ["WELL", "arifOS", "WEALTH"]
    reason: "Coupled readiness gate — human bandwidth is a precondition"

  - scenario: "task mentions A-FORGE without prior SEAL"
    example: "build and deploy this"
    resolution: "BLOCK — route to arif_judge_deliberate first"
    order: ["arifOS"]
    reason: "A-FORGE is execution-only after SEAL — never direct"

  - scenario: "task is multi-organ with no dominant signal"
    example: "evaluate this opportunity holistically"
    resolution: "Route arif_kernel_route for deliberate organ selection"
    order: ["arifOS"]
    reason: "Kernel must classify before routing"

