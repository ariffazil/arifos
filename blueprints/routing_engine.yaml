# SECTION 5: REVERSIBILITY GATE — ROUTING CONSTRAINT
# ─────────────────────────────────────────────────────────────────

reversibility_gate:

  TIER_3_IRREVERSIBLE_instruments:
    - "arif_judge_deliberate"  # 888 — must precede arif_forge_execute
    - "arif_forge_execute"      # 010 — requires prior SEAL
    - "arif_vault_seal"         # 999 — appends to immutable ledger
    - "wealth_governance_verdict" # WEALTH Ω-11 — capital allocation
    - "wealth_hysteresis_ledger" # WEALTH Ω-12 — path-dependent state
    - "wealth_ledger_write"      # WEALTH Ω-12 — irreversible append
    - "well_validate_vitality"   # WELL — state change on biological record
    - "well_guard_dignity"       # WELL — dignity state transition
    - "geox_data_ingest_bundle"  # GEOX — data ingestion (reversible only if QC fails)
    - "geox_dst_ingest_test"     # GEOX — DST ingestion

  routing_constraint:
    description: "Any TIER_3 route must enforce 888_JUDGE gate"
    enforcement: "arif_kernel_route returns 'HOLD' verdict and blocks execution path"
    exception: "arif_vault_seal and arif_judge_deliberate are their own gatekeepers"

# ─────────────────────────────────────────────────────────────────
# SECTION 6: ROUTING VERBS — WHAT HAPPENS AT EACH STAGE
# ─────────────────────────────────────────────────────────────────

stage_routing:

  "000_INIT":
    must_run: "arif_session_init"
    then: "Proceed to SENSE"

  "111_SENSE":
    must_run: "arif_sense_observe"
    then: "Proceed to EVIDENCE"

  "222_EVIDENCE":
    fallback: "arif_evidence_fetch"
    if: "arif_sense_observe returns insufficient evidence"

  "333_REASON":
    must_run: "arif_mind_reason"
    then: "Proceed to ROUTE"

  "444_ROUTE":
    must_run: "arif_kernel_route"
    routing_logic: "keyword_substrate_map + task_patterns"
    then: "Dispatch to organ-specific tool"

  "555_MEMORY":
    optional: "arif_memory_recall"
    if: "prior sessions or sealed events are relevant"

  "666_GOVERN":
    must_run: "arif_heart_critique"
    if: "consequential action or ethical risk detected"
    bridge_check: "arif_gateway_connect if cross-organ"

  "777_MEASURE":
    optional: "arif_ops_measure"
    if: "runtime health or VPS state is relevant to decision"

  "888_JUDGE":
    must_run: "arif_judge_deliberate"
    if: "action is TIER_3 or HIGH_STAKES_GATE triggered"
    verdict_must_be: "SEAL | PARTIAL | SABAR | HOLD | VOID"

  "010_EXECUTE":
    requires: "prior SEAL from 888"
    tool: "arif_forge_execute"

  "999_SEAL":
    requires: "completed consequential action"
    tool: "arif_vault_seal"

