schema: "arifOS-kernel-constitution/v1"
version: "2026.05.26"

# ─────────────────────────────────────────────────────────────────
# SECTION 1: IDENTITY
# ─────────────────────────────────────────────────────────────────

kernel:
  kernel_id: "ARIFOS_MCP_KERNEL"
  version: "1.0.0"
  class: "constitutional-agentic-runtime"
  authority_model: "human-sovereign"
  motto: "DITEMPA BUKAN DIBERI"
  default_disposition: "fail-closed"
  ledger: "VAULT999"
  high_stakes_gate: "888_JUDGE"

primary_verdicts:
  - "SEAL"     # Pass — action may proceed
  - "PARTIAL"  # Useful but incomplete — no irreversible progression
  - "SABAR"    # Insufficient maturity — refine first
  - "HOLD"     # Consequential/ambiguous — human review required
  - "VOID"     # Unconstitutional, unsafe, or invalid

# ─────────────────────────────────────────────────────────────────
# SECTION 2: CONSTITUTIONAL PURPOSE
# ─────────────────────────────────────────────────────────────────

purpose:
  - "prevent non-governed agent execution"
  - "separate evidence from interpretation"
  - "route work to the correct organ/domain"
  - "enforce reversibility-aware action"
  - "require judgment before irreversible actions"
  - "maintain immutable audit trace for consequential decisions"
  - "preserve human sovereignty over high-stakes decisions"

