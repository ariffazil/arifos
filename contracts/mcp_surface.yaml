schema_version: 2
kind: arifos.mcp_surface
owner_repo: arifOS
status: contract
last_verified: "2026-06-30"
runtime_surface:
  primary_transport: streamable_http
  primary_port: 8088
  secondary_ports:
    arifosd: 18081
  public_domains:
    - https://arifos.arif-fazil.com/mcp
  verification_endpoint: https://arifos.arif-fazil.com/api/federation-probe
  verified_tool_counts:
    arifos: 19
    geox: 31
    wealth: 19
    well: 17
    a-forge: 1
  verified_services:
    - arifos.service:8088
    - arifosd.service:18081
    - wealth-organ.service:18082
    - well.service:18083
    - geox-mcp.service:8081
    - a-forge.service:7071
    - aaa-a2a.service:3001
    - openclaw-gateway.service:18789
    - cn-organ.service:18795
    - apex-prime.service:3002
    - vault999-api.service:8100
    - vault999-writer.service:5001
    - cloudflared.service
authority:
  owns:
    - governance_primitives
    - floor_checks
    - memory_governance
    - audit_and_vault
    - federation_brokering
  resources_owned:
    - arifos://identity
    - arifos://kernel/*
    - arifos://reality/state
    - arifos://resources/index
    - arifos://resources/audit
    - arifos://leases/*
    - arifos://doctrine
    - arifos://trinity
    - arifos://vault/*
    - runner://*
  excludes:
    - domain_geology_logic
    - capital_allocation_logic
    - cockpit_ui
    - deployment_substrate
canonical_tools:
  - arif_init
  - arif_observe
  - arif_think
  - arif_route
  - arif_judge
  - arif_act
  - arif_seal
public_surface:
  default_mode: canonical7
  default_public_count: 7
  public_verbs:
    - arif_init
    - arif_observe
    - arif_think
    - arif_route
    - arif_judge
    - arif_act
    - arif_seal
  operator_debug_mode: expanded45
  operator_debug_gate: ARIFOS_MCP_EXPOSE_DEV_TOOLS=true
  internal_transport_only:
    - ping
    - challenge
    - status
    - conformance
    - tool_retrieval
    - vault_query
canonical_modes:
  arif_init:
    - init
    - light
    - full
    - resume
    - validate
    - epoch_open
    - epoch_seal
  arif_observe:
    - search
    - hybrid_discovery
    - ingest
    - compass
    - atlas
    - entropy_dS
    - vitals
    - repo_map
  arif_think:
    - reason
    - reflect
    - verify
    - critique
    - plan
    - plan_review
    - plan_approve
    - refactor_plan
    - metabolize
  arif_judge:
    - judge
    - compare
    - history
    - explain
    - floor_status
    - witness_consensus
  arif_seal:
    - seal
    - dry_run
    - list
    - verify
    - chain
    - render
  arif_act:
    - execute
    - dry_run
    - verify_seal
drift_detection:
  enabled: true
  check_interval_seconds: 300
  max_tolerated_drift: 0
  drift_response: DEGRADE_TO_HOLD
