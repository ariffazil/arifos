schema_version: 1
kind: arifos.mcp_surface
owner_repo: arifOS
status: contract
last_verified: "2026-05-19"
runtime_surface:
  primary_transport: streamable_http
  primary_port: 8080
  public_domains:
    - https://arifos.arif-fazil.com/mcp
    - https://mcp.arif-fazil.com/mcp
authority:
  owns:
    - governance_primitives
    - floor_checks
    - memory_governance
    - audit_and_vault
    - federation_brokering
  excludes:
    - domain_geology_logic
    - capital_allocation_logic
    - cockpit_ui
    - deployment_substrate
canonical_tools:
  - arif_session_init
  - arif_sense_observe
  - arif_evidence_fetch
  - arif_mind_reason
  - arif_kernel_route
  - arif_reply_compose
  - arif_memory_recall
  - arif_heart_critique
  - arif_gateway_connect
  - arif_ops_measure
  - arif_judge_deliberate
  - arif_vault_seal
  - arif_forge_execute
artifact_policy:
  machine_readable: required
  human_readable: required_for_judge_or_seal
  vault_receipt: required_for_irreversible_or_sealed_actions
hold_conditions:
  - secret_rotation
  - public_deploy_without_build_test_health
  - cross_repo_architecture_change
  - destructive_or_irreversible_action
