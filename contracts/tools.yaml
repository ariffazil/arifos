# ════════════════════════════════════════════════════════════════════════════════
# CONFORMANCE SEEDS — used by compiler to generate tests
# ════════════════════════════════════════════════════════════════════════════════
conformance_seeds:
  - { description: "Every tool must have a canonical_name",                       rule: "tools[*].canonical_name is non-empty and unique" }
  - { description: "Every tool's axis must exist in axes",                       rule: "tools[*].axis in axes[*].id" }
  - { description: "Every tool's pipeline_stage must exist in taxonomy",         rule: "tools[*].pipeline_stage in taxonomies.pipeline_stages" }
  - { description: "Every tool's reversibility must be in taxonomy",             rule: "tools[*].reversibility in taxonomies.reversibility" }
  - { description: "Every tool's blast_radius must be in taxonomy",              rule: "tools[*].blast_radius in taxonomies.blast_radius" }
  - { description: "Every tool's authority_required must be in taxonomy",        rule: "tools[*].authority_required in taxonomies.authority_required" }
  - { description: "Every tool's channel must be in taxonomy",                    rule: "tools[*].channel in taxonomies.channel" }
  - { description: "Every tool's contract_class must be in taxonomy",            rule: "tools[*].contract_class in taxonomies.contract_class" }
  - { description: "Every tool's mutation_class must be in taxonomy",            rule: "tools[*].mutation_class in taxonomies.mutation_class" }
  - { description: "Every tool must have at least one mode",                      rule: "tools[*].modes is non-empty" }
  - { description: "Every tool's denial_codes must exist in denial taxonomy",    rule: "tools[*].denial_codes subset of denial_codes[*].code" }
  - { description: "Every tool's audit_events must exist in audit taxonomy",      rule: "tools[*].audit_events subset of audit_events[*].event" }
  - { description: "Every tool's witness_requirements must be in witness_legs or empty", rule: "tools[*].witness_requirements subset of taxonomies.witness_legs or empty" }
  - { description: "Beta-channel tools must require sovereign OR have hold_conditions",  rule: "tools[channel=beta].authority_required == sovereign or tools[channel=beta].hold_conditions non-empty" }
  - { description: "Sandbox-channel tools must be reversible (no live side effect)",     rule: "tools[channel=sandbox].reversibility == reversible" }
  - { description: "Irreversible tools must require sovereign authority",                rule: "tools[reversibility=irreversible].authority_required == sovereign" }
  - { description: "Civilizational blast_radius tools must require sovereign authority",  rule: "tools[blast_radius=civilizational].authority_required == sovereign" }
  - { description: "SEAL-class tools (contract_class=seal) must require verdict_token + epoch_id + receipt_parent_ids", rule: "tools[contract_class=seal].requires_verdict_token and tools[contract_class=seal].requires_epoch_id and tools[contract_class=seal].requires_receipt_parent_ids" }
  - { description: "SEAL-class tools must have mutation_class=seal",                     rule: "tools[contract_class=seal].mutation_class == seal" }
  - { description: "Gateway-class tools (cross-organ boundary) must have requires_plan=true", rule: "tools[contract_class=gateway].requires_plan == true" }
  - { description: "Every legacy alias must resolve to a canonical_name",               rule: "legacy_aliases[*].canonical in tools[*].canonical_name" }
  - { description: "Every denial_code must have retryability",                          rule: "denial_codes[*].retryability in taxonomies.retryability" }
