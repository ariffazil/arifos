# ── DENIAL CODES (every denial: code, floor, severity, retryability, remediation) ──
denial_codes:
  - { code: PLAN_MISSING,          floor: F1,  severity: hard,  retryability: retryable,      description: "No approved plan for non-trivial action",                   remediation: "Submit plan via arif_think(mode=plan); obtain plan_id" }
  - { code: AUTH_MISSING,          floor: F11, severity: hard,  retryability: retryable,      description: "Required actor authority absent",                          remediation: "Escalate to higher authority tier or request 888_HOLD" }
  - { code: AUTHORITY_INSUFFICIENT, floor: F13, severity: hard,  retryability: non_retryable,  description: "Actor authority below required tier for capability",      remediation: "Escalate or reduce capability authority_required" }
  - { code: PLAN_NOT_APPROVED,     floor: F1,  severity: hard,  retryability: human_only,     description: "Plan exists but not approved by sovereign",               remediation: "Request plan approval before execution" }
  - { code: CONTRACT_DRIFT,        floor: F8,  severity: hard,  retryability: non_retryable,  description: "Runtime contract has drifted from SSOT",                    remediation: "Run arif_kernel_status(mode=find_contract_drift) and reconcile" }
  - { code: WITNESS_DEFICIT,       floor: F2,  severity: hard,  retryability: retryable,      description: "Action requires witness but none attached",               remediation: "Attach witness with witness_type ∈ {human, ai, earth}" }
  - { code: ONTOLOGY_VIOLATION,     floor: F8,  severity: hard,  retryability: non_retryable,  description: "Tool classification violates ontology rules",              remediation: "Fix tool classification in tools.yaml" }
  - { code: TRUTH_DEFICIT,         floor: F2,  severity: hard,  retryability: retryable,      description: "FACT/ESTIMATE claim without evidence source",              remediation: "Attach evidence_sources or downgrade to HYPOTHESIS" }
  - { code: IRREVERSIBLE_WITHOUT_HOLD, floor: F13, severity: hard, retryability: human_only,  description: "Irreversible mutation without 888_HOLD",                   remediation: "Request sovereign hold or downgrade to reversible" }
  - { code: CHANNEL_VIOLATION,     floor: F8,  severity: hard,  retryability: retryable,      description: "Tool channel policy violated",                              remediation: "Move tool to allowed channel or escalate authority" }
  - { code: BLAST_RADIUS_EXCEEDED, floor: F2,  severity: hard,  retryability: non_retryable,  description: "Action blast_radius exceeds allowed scope for actor",      remediation: "Reduce blast_radius or escalate authority" }
  - { code: LEASE_EXPIRED,         floor: F8,  severity: soft,  retryability: retryable,      description: "Capability lease has expired",                              remediation: "Renew lease via arif_kernel_attest" }
  - { code: EPOCH_MISMATCH,        floor: F8,  severity: hard,  retryability: retryable,      description: "Action epoch_id does not match current session epoch",      remediation: "Re-bind session via arif_init(mode=resume)" }
  - { code: ENVELOPE_MISSING,      floor: F1,  severity: hard,  retryability: retryable,      description: "Tool call without kernel envelope (epoch_id, plan_id, task_id, actor_id)", remediation: "Wrap call in kernel envelope" }
  - { code: VERDICT_TOKEN_MISSING, floor: F1,  severity: hard,  retryability: retryable,      description: "Mutation requires verdict_token from prior VERDICT stage", remediation: "Obtain verdict_token via arif_judge" }
  - { code: SCHEMA_VALIDATION_FAILED, floor: F8, severity: hard, retryability: retryable,    description: "Tool input does not match contract input_schema",           remediation: "Re-shape input per input_schema" }
  - { code: HALLUCINATION_DETECTED, floor: F9, severity: hard,  retryability: non_retryable, description: "F9 ANTI-HANTU: consciousness/soul claim detected",          remediation: "Remove consciousness/soul claim; use mechanical vocabulary" }
  - { code: CONSCIOUSNESS_CLAIM,   floor: F9,  severity: hard,  retryability: non_retryable,  description: "F9 ANTI-HANTU: 'I am conscious' / 'I feel' claim",            remediation: "Replace with mechanical: 'I processed', 'I computed'" }
  - { code: HUMAN_VETO_REQUIRED,   floor: F13, severity: hard,  retryability: human_only,     description: "F13 SOVEREIGN: action requires human veto",                 remediation: "Request sovereign authorization" }
  - { code: BETA_NON_SOVEREIGN,    floor: F13, severity: hard,  retryability: retryable,      description: "Beta-channel mutation by non-SOVEREIGN actor",              remediation: "Escalate to SOVEREIGN or use stable/sandbox" }
  - { code: SANDBOX_SIDE_EFFECT,   floor: F8,  severity: hard,  retryability: non_retryable,  description: "Sandbox-channel tool attempted live side effect",          remediation: "Use stable/beta channel for live execution" }
  - { code: UNKNOWN_CAPABILITY,    floor: F8,  severity: soft,  retryability: non_retryable,  description: "Tool not in capability graph",                              remediation: "Register in tools.yaml and recompile" }

