  witness_legs:     [human, ai, earth]
  pipeline_stages:  [intake, intent, plan, verdict, execute, receipt, seal]
  contract_class:   [ordinary, gateway, verdict, seal, diagnostic]
  mutation_class:   [read, write, execute, seal]
  retryability:     [retryable, non_retryable, human_only]

