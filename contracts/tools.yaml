  version: "0.1.0"
  generated_at: "2026-06-28T21:15:00+08:00"
  source_of_truth: true
  schema_owners: [arif, forge]
  breaking_change_policy: "Taxonomy/denial/required-field changes require new contract_family major version."

# ── TAXONOMIES (frozen enums) ──────────────────────────────────────────────
taxonomies:
  reversibility:    [reversible, guarded, irreversible]
  blast_radius:     [low, medium, high, civilizational]
  authority_required: [public, operator, sovereign]
  channel:          [stable, beta, sandbox]
